<body>
<div class="container">
  <div class="header">
    <h1>⚙️ システム構成・稼働率 (MTBF/MTTR)</h1>
    <div class="sub">FE試験対策 — 40問 · 30分 · Yasashii Ch.5 + Slide 5_システム構成要素 第1-3回</div>
  </div>
  <div id="quiz-area">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progress-text">第1問 / 40</span>
        <span id="score-text">正解: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:2.5%"></div></div>

      <div class="stat-box"><div class="v" id="r-wrong">0</div><div class="l">不正解 / Sai</div></div>
      <div class="stat-box"><div class="v" id="r-total">40</div><div class="l">合計 / Tổng</div></div>

    <button class="restart" onclick="restart()">🔄 もう一度 / Làm lại</button>
  </div>
</div>

<script>
const QUIZ = [
  // ===== DỄ (12 câu) =====
  {d:"easy",
   jp:"MTBFの意味として正しいものはどれか。",
   vn:"MTBF có ý nghĩa gì?",
   o_jp:["Mean Time Before Fix","Mean Time Between Failures（故障と故障の間隔の平均）","Maximum Time Before Failure","Median Time Between Functions"],
   o_vn:["—","Thời gian trung bình giữa các lần hỏng","—","—"],
   ans:1,
   exp_jp:["誤り。","正解 — Slide第2回：MTBF = 故障と故障の間隔の平均時間 = 正常稼働時間の平均。","誤り。","誤り。"],
   exp_vn:["Sai.","Đúng — MTBF = thời gian TB giữa các lần hỏng = 稼働時間 TB.","Sai.","Sai."]},

  {d:"easy",
   jp:"MTTRの意味として正しいものはどれか。",
   vn:"MTTR có ý nghĩa gì?",
   o_jp:["Mean Time To Run","Mean Time To Repair（修理にかかる平均時間）","Max Time To Restart","Median Time To Reset"],
   o_vn:["—","Thời gian sửa trung bình","—","—"],
   ans:1,
   exp_jp:["誤り。","正解 — Slide第2回：MTTR = 修理にかかる平均時間。小さいほど保守性が高い。","誤り。","誤り。"],
   exp_vn:["Sai.","Đúng — MTTR = thời gian sửa TB. Nhỏ → bảo trì tốt.","Sai.","Sai."]},

  {d:"easy",
   jp:"稼働率（Availability）の公式として正しいものはどれか。",
   vn:"Công thức 稼働率 đúng là gì?",
   o_jp:["MTBF / MTTR","MTBF /（MTBF + MTTR）","MTTR / MTBF","（MTBF + MTTR）/ MTBF"],
   o_vn:["","","",""],
   ans:1,
   exp_jp:["誤り。","正解 — Slide第2回：稼働率 = MTBF /（MTBF + MTTR）。","これは故障率に近い。","誤り。"],
   exp_vn:["Sai.","Đúng — Công thức chính thức.","Gần với tỷ lệ hỏng.","Sai."]},

  {d:"easy",
   jp:"RASISの「R」が表すものはどれか。",
   vn:"Chữ R trong RASIS là gì?",
   o_jp:["Reliability（信頼性）— MTBFで評価","Recovery","Replication","Refresh"],
   o_vn:["Độ tin cậy","—","—","—"],
   ans:0,
   exp_jp:["正解 — Slide第2回：R = Reliability = システム安定稼働。評価指標 = MTBF。","誤り。","誤り。","誤り。"],
   exp_vn:["Đúng — R = Reliability, đo bằng MTBF.","Sai.","Sai.","Sai."]},

  {d:"easy",
   jp:"集中処理の特徴として正しいものはどれか。",
   vn:"Đặc điểm của 集中処理?",
   o_jp:["複数の対等なコンピュータが処理を担当","1台の大型コンピュータ（ホストコンピュータ）が複数端末の全命令を処理","クラウドベース","P2P構成"],
   o_vn:["—","1 host xử lý mọi lệnh từ terminal","—","—"],
   ans:1,
   exp_jp:["それは分散処理。","正解 — Yasashii Lesson 05-01：「1台の大型コンピュータに複数の端末を接続」, 大型コンピュータをホストコンピュータと呼ぶ。","誤り。","誤り。"],
   exp_vn:["Đó là 分散処理.","Đúng — Định nghĩa nguyên văn Yasashii.","Sai.","Sai."]},

  {d:"easy",
   jp:"分散処理システムの3種類として、Yasashiiが挙げているものはどれか。",
   vn:"3 loại 分散処理 mà Yasashii nêu là?",
   o_jp:["クライアントサーバ・3層クライアントサーバ・Webシステム","集中・分散・並列","P2P・C/S・ハブ型","TCP・UDP・IP"],
   o_vn:["","","",""],
   ans:0,
   exp_jp:["正解 — Yasashii Lesson 05-01：分散処理システムには「クライアントサーバ、3層クライアントサーバ、Webシステム」の3種類がある。","誤り。","誤り。","ネットワークプロトコルである。"],
   exp_vn:["Đúng — Theo Yasashii.","Sai.","Sai.","Là giao thức mạng."]},

  {d:"easy",
   jp:"デュアルシステムとはどのような方式か。",
   vn:"Dual System là gì?",
   o_jp:["1台で2つの処理を行う","2系統のシステムで同時に処理し、結果を照合する","現用系と待機系で構成し、障害時に切替","クラウドバックアップ"],
   o_vn:["","2 hệ thống chạy song song + so kết quả","","" ],
   ans:1,
   exp_jp:["誤り。","正解 — Yasashii 過去問 5-2 解答 エ：「一つの処理を2系統のシステムで独立に行い、結果を照合する方式」。","それはデュプレックスシステム。","誤り。"],
   exp_vn:["Sai.","Đúng — 2 hệ thống độc lập + so kết quả.","Đó là デュプレックス.","Sai."]},

  {d:"easy",
   jp:"デュプレックスシステムとはどのような方式か。",
   vn:"Duplex System là gì?",
   o_jp:["2系統で同時並行処理","現用系と待機系の2系統で構成し、現用系障害時に待機系が処理を受け継ぐ","自動バックアップ","暗号化二重化"],
   o_vn:["","現用系 + 待機系, failover","",""],
   ans:1,
   exp_jp:["それはデュアル。","正解 — Yasashii：デュプレックス = 「現用系と待機系の2系統。現用系に障害が生じたときに待機系が処理を受け継ぐ方式」。","誤り。","誤り。"],
   exp_vn:["Đó là デュアル.","Đúng — Có 現用系 + 待機系, failover.","Sai.","Không liên quan."]},

  {d:"easy",
   jp:"フォールトトレラントシステムの説明として正しいものはどれか。",
   vn:"Fault Tolerant là gì?",
   o_jp:["故障しないように設計する","システムが部分的に故障しても、システム全体としては必要な機能を維持する","常時バックアップを取る","CPUを高速化する"],
   o_vn:["","Hỏng 1 phần vẫn duy trì chức năng cần thiết","",""],
   ans:1,
   exp_jp:["それはフォールトアボイダンス。","正解 — Yasashii 過去問 5-4 解答 ア：「システムが部分的に故障しても、システム全体としては必要な機能を維持するシステム」。","別の概念。","別の概念。"],
   exp_vn:["Đó là Fault Avoidance.","Đúng — Định nghĩa nguyên văn.","Khác khái niệm.","Khác."]},

  {d:"easy",
   jp:"フェールセーフの説明として正しいものはどれか。",
   vn:"Fail Safe là gì?",
   o_jp:["故障した時は安全を優先（システムを止めても良い）","故障しても性能が落ちても動作続行","故障しないように設計","自動復旧"],
   o_vn:["Hỏng thì dừng, ưu tiên an toàn","","",""],
   ans:0,
   exp_jp:["正解 — Yasashii Lesson 05-02：フェールセーフ = 「障害が起きた時に、システムを止めてでも安全を優先させる設計」。","それはフェールソフト。","別の概念。","別の概念。"],
   exp_vn:["Đúng — Dừng cũng được, ưu tiên an toàn.","Đó là Fail Soft.","Sai.","Khác khái niệm."]},

  {d:"easy",
   jp:"フェールソフトの説明として正しいものはどれか。",
   vn:"Fail Soft là gì?",
   o_jp:["故障時に完全停止","故障した時、性能が落ちてもシステム全体は動作させる（縮退運転/フォールバック）","誤操作対策","二重化"],
   o_vn:["","Hỏng thì giảm hiệu năng vẫn chạy","",""],
   ans:1,
   exp_jp:["それはフェールセーフ。","正解 — Yasashii Lesson 05-02：「たとえ性能が落ちたとしても、システム全体は動作させる設計」。限定動作を縮退運転（フォールバック）と呼ぶ。","別の概念（フールプルーフ）。","別の概念。"],
   exp_vn:["Đó là Fail Safe.","Đúng — Hỏng thì giảm hiệu năng vẫn chạy.","Khác.","Sai."]},

  {d:"easy",
   jp:"フールプルーフの説明として正しいものはどれか。",
   vn:"Fool Proof là gì?",
   o_jp:["故障時の安全停止","性能低下しても動作続行","利用者が誤った操作をしてもシステムに異常が起こらないようにする","複数CPU構成"],
   o_vn:["","","Người dùng thao tác sai không gây lỗi",""],
   ans:2,
   exp_jp:["それはフェールセーフ。","それはフェールソフト。","正解 — Yasashii Lesson 05-02：「人間が間違った使い方をしても、システムに異常が起こらないようにする設計」。例：ドアを閉めないと加熱できない電子レンジ。","別の概念。"],
   exp_vn:["Là Fail Safe.","Là Fail Soft.","Đúng — vd lò vi sóng không nóng khi cửa hở.","Sai."]},

  // ===== TB (16 câu) =====
  {d:"med",
   jp:"あるシステムの稼働履歴は次のとおりである：稼働200h → 修理3h → 稼働100h → 修理1h → 稼働150h → 修理2h。MTBFはいくらか。",
   vn:"Lịch sử vận hành: 200h-3h-100h-1h-150h-2h. MTBF = ?",
   o_jp:["150 時間","100 時間","450 時間","6 時間"],
   o_vn:["150 giờ","","",""],
   ans:0,
   exp_jp:["正解 — Slide第2回 原文：MTBF =（200+100+150）÷ 3 = 150時間。","誤り。","稼働時間の合計（÷3していない）。","故障回数の合計。"],
   exp_vn:["Đúng — (200+100+150)/3 = 150.","Sai.","Là tổng稼働 chưa chia.","Là số lần."]},

  {d:"med",
   jp:"同じ稼働履歴のMTTRはいくらか。",
   vn:"Cùng dữ liệu, MTTR = ?",
   o_jp:["6 時間","2 時間","3 時間","1 時間"],
   o_vn:["","2 giờ","",""],
   ans:1,
   exp_jp:["修理時間の合計（÷3していない）。","正解 — MTTR =（3+1+2）÷ 3 = 2時間。","回数を表す数。","最小修理時間。"],
   exp_vn:["Là tổng 修理.","Đúng — (3+1+2)/3 = 2.","Là số lần.","Sai."]},

  {d:"med",
   jp:"同じ稼働履歴の稼働率はおよそいくらか。",
   vn:"Cùng dữ liệu, 稼働率 ≈ ?",
   o_jp:["0.987（98.7%）","0.5","0.81","0.95"],
   o_vn:["≈ 98.7%","","",""],
   ans:0,
   exp_jp:["正解 — Slide第2回 原文：150/(150+2) = 150/152 ≈ 0.987。","誤り。","それは0.9×0.9の直列稼働率。","誤り。"],
   exp_vn:["Đúng — 150/152 ≈ 0.987.","Sai.","Là直列 A×B = 0.9×0.9.","Sai."]},

  {d:"med",
   jp:"稼働率0.9のシステムA・Bを直列接続したとき、全体の稼働率はいくらか。",
   vn:"A=0.9, B=0.9 nối tuần tự. 稼働率 tổng = ?",
   o_jp:["1.8","0.81","0.99","0.45"],
   o_vn:["","0.81","",""],
   ans:1,
   exp_jp:["確率値が1を超えるのは不適。","正解 — Slide第2回：直列 = A × B = 0.9 × 0.9 = 0.81。","それは並列の場合。","誤り。"],
   exp_vn:["Không hợp lý (>1).","Đúng — 直列 = A×B.","Đó là 並列.","Sai."]},

  {d:"med",
   jp:"稼働率0.9のシステムA・Bを並列接続したとき、全体の稼働率はいくらか。",
   vn:"A=0.9, B=0.9 nối song song. 稼働率 tổng = ?",
   o_jp:["0.81","0.99","0.9","1.0"],
   o_vn:["","0.99","",""],
   ans:1,
   exp_jp:["それは直列の場合。","正解 — Slide第2回：並列 = 1 −（1−0.9）（1−0.9）= 1 − 0.01 = 0.99。","個々の稼働率と同じになるのは無関係系のみ。","100%は到達できない。"],
   exp_vn:["Đó là 直列.","Đúng — 1 − 0.01 = 0.99.","Sai.","Không đạt 100%."]},

  {d:"med",
   jp:"Yasashii過去問5-3：「コンピュータを2台用意しておき、現用系が故障したときは、現用系と同一のオンライン処理プログラムをあらかじめ起動して待機している待機系のコンピュータに速やかに切り替える」 — このシステムはどれか。",
   vn:"Mô tả trên ứng với hệ thống nào?",
   o_jp:["コールドスタンバイシステム","ホットスタンバイシステム","マルチプロセッサシステム","マルチユーザシステム"],
   o_vn:["","Hot Standby","",""],
   ans:1,
   exp_jp:["待機系は電源OFF・停止状態。","正解 — Yasashii解答5-3 イ：ホットスタンバイ = 「待機系のコンピュータに同一のプログラムを起動済みで待機させ、故障時に速やかに切り替える」。","1システムに複数CPU。","複数ユーザの同時利用。"],
   exp_vn:["待機系 OFF.","Đúng — Hot Standby, chuyển đổi nhanh.","Đa CPU.","Đa người dùng."]},

  {d:"med",
   jp:"コールドスタンバイシステムの特徴はどれか。",
   vn:"Cold Standby đặc trưng?",
   o_jp:["待機系を電源ON・プログラム起動済みで待機させる","待機系には電源を入れず、停止した状態で待機させる","2系統で完全同時並行処理","CPU を2つ搭載"],

let cur=0, answers=new Array(QUIZ.length).fill(null);
function render(){
  const q=QUIZ[cur];
  const tag = q.d==="easy"?'<span class="q-tag tag-easy">易 / Dễ</span>':q.d==="med"?'<span class="q-tag tag-med">中 / TB</span>':'<span class="q-tag tag-hard">難 / Khó</span>';
  const L=["ア","イ","ウ","エ"];
  let opts=q.o_jp.map((t,i)=>{
    let cls="option";
    if(answers[cur]!==null){
      cls+=" locked";
      if(i===q.ans)cls+=" correct";
      else if(i===answers[cur])cls+=" incorrect";
    }
    const vnText = q.o_vn[i] && q.o_vn[i]!=="" && q.o_vn[i]!=="—" ? `<span class="text-vn">🇻🇳 ${q.o_vn[i]}</span>` : "";
    return `<div class="${cls}" onclick="pick(${i})"><span class="letter">${L[i]}.</span><span><span class="text-jp">${t}</span>${vnText}</span></div>`;
  }).join("");
  let explHtml="";
  if(answers[cur]!==null){
    let rows = q.exp_jp.map((e,i)=>{
      const vn = q.exp_vn[i] || "";
      return `<div class="row"><b>${L[i]}：</b><div class="lang-jp">🇯🇵 ${e}</div><div class="lang-vn">🇻🇳 ${vn}</div></div>`;
    }).join("");
    explHtml=`<button class="explain-btn show" onclick="toggleExp()">📖 解説を表示 / Xem giải thích</button>
      <div class="explain" id="exp">
        <div class="row"><b>正解：${L[q.ans]}</b></div>
        ${rows}
        <div class="row" style="margin-top:8px;border-top:1px solid #475569;padding-top:8px"><b>FE出題範囲：</b>システムの構成・信頼性（Yasashii Ch.5 / Slide 5 第1-3回）</div>
      </div>`;
  }
  document.getElementById("question-container").innerHTML=`
    <div class="question-card">${tag}
      <div class="q-jp"><b>第${cur+1}問：</b>${q.jp}</div>
      <div class="q-vn">🇻🇳 Câu ${cur+1}: ${q.vn}</div>
      <div class="options">${opts}</div>${explHtml}
    </div>`;
  document.getElementById("progress-text").textContent=`第${cur+1}問 / ${QUIZ.length}`;
  document.getElementById("score-text").textContent=`正解: ${answers.filter((a,i)=>a===QUIZ[i].ans).length}`;
  document.getElementById("progress-fill").style.width=`${((cur+1)/QUIZ.length)*100}%`;
  document.getElementById("prev-btn").disabled=cur===0;
  document.getElementById("next-btn").textContent=cur===QUIZ.length-1?"🏁 終了 / Kết thúc":"次の問題 →";
}
function pick(i){if(answers[cur]!==null)return;answers[cur]=i;render();}
function toggleExp(){document.getElementById("exp").classList.toggle("open");}
function prev(){if(cur>0){cur--;render();}}
function next(){if(cur<QUIZ.length-1){cur++;render();}else showResult();}
function showResult(){
  const c=answers.filter((a,i)=>a===QUIZ[i].ans).length;
  const pct=Math.round(c/QUIZ.length*100);
  document.getElementById("quiz-area").classList.add("hidden");
  document.getElementById("result-screen").classList.remove("hidden");
  document.getElementById("r-correct").textContent=c;
  document.getElementById("r-wrong").textContent=QUIZ.length-c;
  document.getElementById("r-total").textContent=QUIZ.length;
  document.getElementById("score-inner").textContent=pct+"%";
  document.getElementById("score-circle").style.setProperty("--p",pct*3.6+"deg");
  let v;
  if(pct>=90)v="🏆 素晴らしい！システム構成・稼働率をしっかり理解しています。/ Xuất sắc!";
  else if(pct>=75)v="👍 良いペース。MTBF/MTTRの公式とフェール系の用語を復習しましょう。/ Khá tốt!";
  else if(pct>=60)v="📚 普通。Yasashii Ch.5 + Slide第1-3回を見直しましょう。/ Trung bình.";
  else v="⚠️ 基礎の復習が必要。もう一度挑戦してください。/ Cần ôn lại.";
  document.getElementById("verdict").textContent=v;
}
function restart(){cur=0;answers=new Array(QUIZ.length).fill(null);document.getElementById("quiz-area").classList.remove("hidden");document.getElementById("result-screen").classList.add("hidden");render();}
render();
</script>
</body>
</html>
