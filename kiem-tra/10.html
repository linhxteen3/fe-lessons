<title>FE Exam - プログラムの基本・フローチャート・データ構造 (40 câu)</title>
<style>
  :root{
    --bg:#0f1218; --card:#171c26; --card2:#1f2632; --accent:#4f8cff; --accent2:#6cd4ff;
    --green:#22c55e; --red:#ef4444; --amber:#fbbf24;
    --text:#e6e9ef; --muted:#9aa3b2; --border:#2a3140;
    --easy:#22c55e; --mid:#fbbf24; --hard:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:20px; font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
    background:linear-gradient(135deg,#0f1218 0%,#141a26 100%); color:var(--text); min-height:100vh;
    line-height:1.6;
  }
  .container{max-width:880px; margin:0 auto;}
  header{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:20px 24px; margin-bottom:16px;
  }
  h1{margin:0 0 6px; font-size:1.35rem; color:var(--accent2)}
  .subtitle{color:var(--muted); font-size:.9rem; margin:0}
  .meta{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:.85rem; color:var(--muted)}
  .meta span{background:var(--card2); padding:4px 10px; border-radius:8px; border:1px solid var(--border)}

  .progress-wrap{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:12px 16px; margin-bottom:14px;
  }
  .progress-info{display:flex; justify-content:space-between; font-size:.9rem; margin-bottom:8px}
  .progress-bar{height:8px; background:var(--card2); border-radius:99px; overflow:hidden}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0; transition:width .3s}

  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:22px 24px; margin-bottom:14px;
  }
  .difficulty{
    display:inline-block; padding:2px 10px; border-radius:99px;
    font-size:.78rem; font-weight:600; margin-bottom:10px;
  }
  .diff-easy{background:rgba(34,197,94,.15); color:var(--easy); border:1px solid rgba(34,197,94,.4)}
  .diff-mid{background:rgba(251,191,36,.15); color:var(--mid); border:1px solid rgba(251,191,36,.4)}
  .diff-hard{background:rgba(239,68,68,.15); color:var(--hard); border:1px solid rgba(239,68,68,.4)}

  .question{font-size:1.02rem; margin:0 0 16px; white-space:pre-wrap}
  .question .ja{display:block; color:var(--muted); font-size:.88rem; margin-top:6px; padding-left:8px; border-left:2px solid var(--border)}

  .options{display:flex; flex-direction:column; gap:8px}
  .option{
    background:var(--card2); border:1px solid var(--border); border-radius:10px;
    padding:12px 16px; cursor:pointer; transition:all .15s;
    display:flex; align-items:flex-start; gap:10px; user-select:none;
  }
  .option:hover:not(.locked){border-color:var(--accent); background:#222a39}
  .option .key{
    flex:none; width:26px; height:26px; border-radius:50%; background:var(--border);
    display:grid; place-items:center; font-weight:700; font-size:.85rem;
  }
  .option .body{flex:1}
  .option.correct{background:rgba(34,197,94,.12); border-color:var(--green)}
  .option.correct .key{background:var(--green); color:#fff}
  .option.wrong{background:rgba(239,68,68,.12); border-color:var(--red)}
  .option.wrong .key{background:var(--red); color:#fff}
  .option.locked{cursor:not-allowed; opacity:.85}
  .option.locked:hover{border-color:var(--border)}
  .option.correct.locked, .option.wrong.locked{opacity:1}

  .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px}
  button{
    background:var(--accent); color:#fff; border:0; border-radius:10px;
    padding:10px 18px; font-size:.95rem; font-weight:600; cursor:pointer;
    transition:opacity .15s, transform .05s;
  }
  button:hover:not(:disabled){opacity:.9}
  button:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.4; cursor:not-allowed}
  button.secondary{background:var(--card2); color:var(--text); border:1px solid var(--border)}
  button.amber{background:var(--amber); color:#1a1a1a}

  .explanation{
    margin-top:14px; padding:14px 16px; border-radius:10px;
    background:var(--card2); border-left:3px solid var(--accent2); display:none;
  }
  .explanation.show{display:block}
  .explanation h4{margin:0 0 8px; font-size:.95rem; color:var(--accent2)}
  .explanation p{margin:6px 0; font-size:.92rem}
  .explanation .label{color:var(--accent2); font-weight:600}
  .explanation .topic{
    margin-top:10px; padding-top:10px; border-top:1px dashed var(--border);
    font-size:.85rem; color:var(--muted);
  }

  /* Result screen */
  .result{text-align:center; padding:36px 24px}
  .result h2{margin:0 0 12px; font-size:1.6rem; color:var(--accent2)}
  .score-big{font-size:3rem; font-weight:800; color:var(--accent); margin:14px 0 6px}
  .score-pct{font-size:1.1rem; color:var(--muted); margin-bottom:14px}
  .verdict{font-size:1.05rem; margin:14px 0 22px; padding:14px; border-radius:12px}
  .v-excellent{background:rgba(34,197,94,.12); color:var(--green)}
  .v-good{background:rgba(251,191,36,.12); color:var(--amber)}
  .v-needs-work{background:rgba(239,68,68,.12); color:var(--red)}
  .breakdown{
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    margin:18px 0; text-align:left;
  }
  .breakdown-item{
    background:var(--card2); border:1px solid var(--border); border-radius:10px;
    padding:12px;
  }
  .breakdown-item .lbl{font-size:.8rem; color:var(--muted)}
  .breakdown-item .val{font-size:1.3rem; font-weight:700; margin-top:4px}

  code{background:var(--card2); padding:1px 6px; border-radius:4px; font-family:"SFMono-Regular",Consolas,monospace; font-size:.9em}

  @media(max-width:600px){
    body{padding:12px}
    .card{padding:16px 18px}
    h1{font-size:1.15rem}
    .breakdown{grid-template-columns:1fr}
  }
</style>

<script>
const questions = [
  // ============ PART 1: プログラムの基本 (Slide 2 第1回) — 12 câu ============
  {
    id:1, diff:"easy",
    q:"Định nghĩa nào sau đây mô tả đúng nhất về **アルゴリズム (algorithm)**?",
    ja:"アルゴリズムの定義として最も適切なものはどれか。",
    options:[
      "Ngôn ngữ dùng để ra lệnh cho máy tính thực thi",
      "Trình tự / thủ tục để giải quyết một bài toán hoặc nhiệm vụ (問題を解いたり課題を解決するための手順)",
      "Tập hợp các ký hiệu chuẩn của フローチャート (流れ図)",
      "Bộ nhớ chính (主記憶装置) nơi lưu trữ dữ liệu trong khi xử lý"
    ],
    correct:1,
    why:"アルゴリズム được định nghĩa là 「問題を解いたり、課題を解決するための手順」— trình tự / thủ tục để giải quyết bài toán. Ví dụ điển hình: các bước nấu cà-ri, các bước mua hàng trên mạng.",
    whyWrong:{
      0:"Đó là định nghĩa của プログラミング言語 (ngôn ngữ lập trình), không phải アルゴリズム.",
      2:"Sai — フローチャート là CÔNG CỤ biểu diễn algorithm, không phải bản thân algorithm.",
      3:"主記憶装置 là phần cứng lưu trữ, không liên quan đến định nghĩa algorithm."
    },
    topic:"FE Syllabus — テクノロジ系 / 基礎理論 / アルゴリズムとプログラミング"
  },
  {
    id:2, diff:"easy",
    q:"Sự khác nhau cơ bản giữa **アルゴリズム** và **プログラム** là gì?",
    ja:"アルゴリズムとプログラムの違いについて、最も適切なものはどれか。",
    options:[
      "アルゴリズム dành cho con người, プログラム là phiên bản tiếng Anh của thuật toán đó",
      "アルゴリズム là thủ tục giải bài toán; プログラム là thủ tục đó được viết bằng một ngôn ngữ cụ thể để máy tính hiểu được",

      "アルゴリズム chỉ dùng cho bài toán toán học; プログラム dùng cho mọi loại bài toán"
    ],
    correct:1,
    why:"Theo Slide 2 第1回: アルゴリズム = thủ tục để giải bài toán (ý tưởng / cách thức); プログラム = thủ tục đó được viết bằng ngôn ngữ lập trình cụ thể (C, Java, Python...) mà máy tính hiểu được. Algorithm được CHUYỂN HOÁ thành program.",
    whyWrong:{
      0:"Sai — sự khác nhau không nằm ở ngôn ngữ tự nhiên mà ở việc có được mã hoá bằng ngôn ngữ máy tính hay không.",

    topic:"FE Syllabus — アルゴリズムとプログラミング / プログラムの基本"

  {
    id:3, diff:"easy",
    q:"Ba cấu trúc cơ bản (基本構造) của thuật toán là gì?",
    ja:"アルゴリズムの基本構造はどれか。",
    options:[
      "入力 (input)・処理 (process)・出力 (output)",

      "順次 (tuần tự)・並列 (song song)・再帰 (đệ quy)"

    whyWrong:{
      0:"Đó là mô hình IPO của một chương trình, không phải 3 cấu trúc cơ bản của algorithm.",
      2:"Đó là các thao tác trong câu lệnh, không phải cấu trúc điều khiển luồng.",
      3:"並列 và 再帰 không thuộc 3 cấu trúc cơ bản — chúng là các khái niệm nâng cao."

    topic:"FE Syllabus — アルゴリズムとプログラミング / 制御構造"
  },
  {
    id:4, diff:"easy",
    q:"**フローチャート (流れ図)** là gì?",
    ja:"フローチャートの説明として正しいものはどれか。",
    options:[
      "Bản vẽ kiến trúc hệ thống dùng trong thiết kế cơ sở dữ liệu",
      "Sơ đồ dùng để biểu diễn luồng xử lý của algorithm; thường được thực thi từ trên xuống dưới",
      "Đồ thị quan hệ giữa các thực thể trong CSDL",
      "Biểu đồ thể hiện sự thay đổi trạng thái của hệ thống theo thời gian"

    correct:1,
    why:"フローチャート (流れ図) là phương pháp biểu diễn algorithm bằng hình ảnh. Theo slide: 「アルゴリズムはフローチャートを使って表され、原則上から下に処理が実行される」— algorithm được biểu diễn bằng flowchart, về nguyên tắc xử lý từ trên xuống dưới.",
    whyWrong:{

    topic:"FE Syllabus — アルゴリズムとプログラミング / フローチャート"

  {
    id:5, diff:"mid",
    q:"Trong フローチャート, mỗi ký hiệu chuẩn (JIS X 0121) tương ứng với loại xử lý nào? Lựa chọn nào dưới đây ghép đúng?",
    ja:"フローチャートの記号と意味の組合せとして、適切なものはどれか。",
    options:[

      "Hình bình hành (▱) = điều kiện rẽ nhánh",
      "Hình chữ nhật (□) = xử lý (処理); Hình thoi (◇) = phán đoán/rẽ nhánh (判断)",

    correct:2,
    why:"Trong ký hiệu chuẩn JIS của flowchart: ▭ (hình chữ nhật) biểu thị xử lý (処理), ◇ (hình thoi) biểu thị phán đoán / rẽ nhánh (判断 = điều kiện if), ▱ (hình bình hành) biểu thị nhập/xuất (入出力), và ⬭ (hình bầu dục) biểu thị bắt đầu/kết thúc.",
    whyWrong:{

  {

    whyWrong:{
      0:"5 chỉ là tổng nếu chỉ cộng X=1+4 hoặc 2+3, không phản ánh tích luỹ đầy đủ.",

    options:[

    whyWrong:{

      3:"Đó là tính chất tổ chức của 2分探索木 hoặc heap, không phải định nghĩa complete tree."

    options:[

// ===== State =====
let current = 0;
let answers = new Array(questions.length).fill(null);

const quizArea = document.getElementById('quiz-area');
const resultArea = document.getElementById('result-area');
const progressText = document.getElementById('progress-text');
const progressFill = document.getElementById('progress-fill');
const answeredCount = document.getElementById('answered-count');
const progressWrap = document.getElementById('progress-wrap');

function diffClass(d){return d==='easy'?'diff-easy':d==='mid'?'diff-mid':'diff-hard'}
function diffLabel(d){return d==='easy'?'[Dễ / 易]':d==='mid'?'[TB / 中]':'[Khó / 難]'}

function render(){
  if(current >= questions.length){renderResult(); return;}
  const q = questions[current];
  const a = answers[current];
  const locked = a !== null;

  const opts = q.options.map((opt, i) => {
    let cls = 'option';
    if(locked){
      cls += ' locked';
      if(i === q.correct) cls += ' correct';
      else if(i === a) cls += ' wrong';
    }
    return `<div class="${cls}" data-idx="${i}">
      <div class="key">${String.fromCharCode(65+i)}</div>
      <div class="body">${opt}</div>
    </div>`;
  }).join('');

  let expHtml = '';
  if(locked){
    const wrongList = Object.keys(q.whyWrong).map(k=>{
      return `<p><span class="label">${String.fromCharCode(65+(+k))}.</span> ${q.whyWrong[k]}</p>`;
    }).join('');
    expHtml = `
      <div class="explanation" id="exp">
        <h4>💡 Giải thích</h4>
        <p><span class="label">Đáp án đúng:</span> ${String.fromCharCode(65+q.correct)}</p>
        <p><span class="label">Vì sao đúng:</span> ${q.why.replace(/\n/g,'<br>')}</p>
        <p><span class="label">Vì sao các phương án còn lại sai:</span></p>
        ${wrongList}
        <div class="topic">📚 <strong>Liên hệ FE:</strong> ${q.topic}</div>
      </div>`;
  }

  quizArea.innerHTML = `
    <div class="card">
      <span class="difficulty ${diffClass(q.diff)}">${diffLabel(q.diff)}</span>
      <p class="question"><strong>Câu ${q.id}.</strong> ${q.q.replace(/\n/g,'<br>')}
        <span class="ja">${q.ja}</span></p>
      <div class="options">${opts}</div>
      ${expHtml}
      <div class="actions">
        <button class="secondary" id="prev-btn" ${current===0?'disabled':''}>← Câu trước</button>
        ${locked ? `<button id="toggle-exp" class="amber">Xem / Ẩn giải thích</button>` : ''}
        <button id="next-btn" ${!locked?'disabled':''}>${current===questions.length-1?'Kết thúc & Xem kết quả':'Câu tiếp →'}</button>
      </div>
    </div>
  `;

  // Attach option listeners
  if(!locked){
    quizArea.querySelectorAll('.option').forEach(el=>{
      el.addEventListener('click', ()=>{
        const idx = +el.dataset.idx;
        answers[current] = idx;
        render();
        updateProgress();
      });
    });
  }

  document.getElementById('prev-btn').addEventListener('click', ()=>{if(current>0){current--; render(); updateProgress();}});
  document.getElementById('next-btn').addEventListener('click', ()=>{current++; render(); updateProgress();});
  const tex = document.getElementById('toggle-exp');
  if(tex){
    const expDiv = document.getElementById('exp');
    expDiv.classList.add('show');
    tex.addEventListener('click', ()=>{ expDiv.classList.toggle('show'); });
  }
}

function updateProgress(){
  if(current >= questions.length){
    progressWrap.style.display = 'none';
    return;
  }
  progressText.textContent = `Câu ${current+1} / ${questions.length}`;
  const answered = answers.filter(a=>a!==null).length;
  answeredCount.textContent = `Đã trả lời: ${answered}`;
  progressFill.style.width = ((current+1)/questions.length*100)+'%';
}

function renderResult(){
  quizArea.style.display='none';
  resultArea.style.display='block';
  progressWrap.style.display='none';

  const totals = {easy:{c:0,t:0}, mid:{c:0,t:0}, hard:{c:0,t:0}};
  let score = 0;
  questions.forEach((q,i)=>{
    totals[q.diff].t++;
    if(answers[i]===q.correct){score++; totals[q.diff].c++;}
  });
  const pct = Math.round(score/questions.length*100);
  let verdict, vClass;
  if(pct >= 80){verdict='🌟 Xuất sắc! Em đã nắm chắc プログラムの基本・フローチャート・データ構造 — sẵn sàng cho 科目A!'; vClass='v-excellent'}
  else if(pct >= 60){verdict='👍 Khá tốt! Cần ôn lại một vài điểm chi tiết, đặc biệt các câu khó.'; vClass='v-good'}
  else{verdict='💪 Cần cố gắng thêm! Hãy ôn lại Slide 2 第1回 + Yasashii Ch.3 Lesson 03-01 rồi làm lại.'; vClass='v-needs-work'}

  resultArea.innerHTML = `
    <div class="card result">
      <h2>🎉 Hoàn thành bài kiểm tra!</h2>
      <div class="score-big">${score} / ${questions.length}</div>
      <div class="score-pct">Đạt ${pct}%</div>
      <div class="verdict ${vClass}">${verdict}</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="lbl">🟢 Dễ / 易</div>
          <div class="val">${totals.easy.c} / ${totals.easy.t}</div>
        </div>
        <div class="breakdown-item">
          <div class="lbl">🟡 TB / 中</div>
          <div class="val">${totals.mid.c} / ${totals.mid.t}</div>
        </div>
        <div class="breakdown-item">
          <div class="lbl">🔴 Khó / 難</div>
          <div class="val">${totals.hard.c} / ${totals.hard.t}</div>
        </div>
      </div>
      <button id="restart-btn">🔁 Làm lại từ đầu</button>
      <button class="secondary" id="review-btn">📖 Xem lại bài</button>
    </div>
  `;
  document.getElementById('restart-btn').addEventListener('click', ()=>{
    current=0; answers=new Array(questions.length).fill(null);
    quizArea.style.display='block'; resultArea.style.display='none'; progressWrap.style.display='block';
    render(); updateProgress();
  });
  document.getElementById('review-btn').addEventListener('click', ()=>{
    current=0;
    quizArea.style.display='block'; resultArea.style.display='none'; progressWrap.style.display='block';
    render(); updateProgress();
  });
}

render();
updateProgress();
</script>
</body>
</html>
