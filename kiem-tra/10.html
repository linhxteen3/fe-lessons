<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE Exam — オートマトン・状態遷移 (Máy tự động & Chuyển trạng thái)</title>
<style>
  :root{
    --bg:#0f1218; --card:#171c26; --card2:#1f2632; --accent:#4f8cff; --accent2:#6cd4ff;
    --green:#22c55e; --red:#ef4444; --amber:#fbbf24;
    --text:#e6e9ef; --muted:#9aa3b2; --border:#2a3140;
    --easy:#22c55e; --mid:#fbbf24; --hard:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:20px; font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
    background:linear-gradient(135deg,#0f1218 0%,#141a26 100%); color:var(--text); min-height:100vh;
    line-height:1.6;
  }
  .container{max-width:880px; margin:0 auto;}
  header{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px 24px; margin-bottom:16px;}
  h1{margin:0 0 6px; font-size:1.35rem; color:var(--accent2)}
  .subtitle{color:var(--muted); font-size:.9rem; margin:0}
  .meta{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:.85rem; color:var(--muted)}
  .meta span{background:var(--card2); padding:4px 10px; border-radius:8px; border:1px solid var(--border)}

  .progress-wrap{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:14px;}
  .progress-info{display:flex; justify-content:space-between; font-size:.9rem; margin-bottom:8px}
  .progress-bar{height:8px; background:var(--card2); border-radius:99px; overflow:hidden}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0; transition:width .3s}

  .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px 24px; margin-bottom:14px;}
  .difficulty{display:inline-block; padding:2px 10px; border-radius:99px; font-size:.78rem; font-weight:600; margin-bottom:10px;}
  .diff-easy{background:rgba(34,197,94,.15); color:var(--easy); border:1px solid rgba(34,197,94,.4)}
  .diff-mid{background:rgba(251,191,36,.15); color:var(--mid); border:1px solid rgba(251,191,36,.4)}
  .diff-hard{background:rgba(239,68,68,.15); color:var(--hard); border:1px solid rgba(239,68,68,.4)}

  .question{font-size:1.02rem; margin:0 0 16px; white-space:pre-wrap}
  .question .ja{display:block; color:var(--muted); font-size:.88rem; margin-top:6px; padding-left:8px; border-left:2px solid var(--border)}

  .options{display:flex; flex-direction:column; gap:8px}
  .option{background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; cursor:pointer; transition:all .15s; display:flex; align-items:flex-start; gap:10px; user-select:none;}
  .option:hover:not(.locked){border-color:var(--accent); background:#222a39}
  .option .key{flex:none; width:26px; height:26px; border-radius:50%; background:var(--border); display:grid; place-items:center; font-weight:700; font-size:.85rem;}
  .option .body{flex:1}
  .option.correct{background:rgba(34,197,94,.12); border-color:var(--green)}
  .option.correct .key{background:var(--green); color:#fff}
  .option.wrong{background:rgba(239,68,68,.12); border-color:var(--red)}
  .option.wrong .key{background:var(--red); color:#fff}
  .option.locked{cursor:not-allowed; opacity:.85}
  .option.locked:hover{border-color:var(--border)}
  .option.correct.locked, .option.wrong.locked{opacity:1}

  .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px}
  button{background:var(--accent); color:#fff; border:0; border-radius:10px; padding:10px 18px; font-size:.95rem; font-weight:600; cursor:pointer; transition:opacity .15s, transform .05s;}
  button:hover:not(:disabled){opacity:.9}
  button:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.4; cursor:not-allowed}
  button.secondary{background:var(--card2); color:var(--text); border:1px solid var(--border)}
  button.amber{background:var(--amber); color:#1a1a1a}

  .explanation{margin-top:14px; padding:14px 16px; border-radius:10px; background:var(--card2); border-left:3px solid var(--accent2); display:none;}
  .explanation.show{display:block}
  .explanation h4{margin:0 0 8px; font-size:.95rem; color:var(--accent2)}
  .explanation p{margin:6px 0; font-size:.92rem}
  .explanation .label{color:var(--accent2); font-weight:600}
  .explanation .topic{margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); font-size:.85rem; color:var(--muted);}

  .result{text-align:center; padding:36px 24px}
  .result h2{margin:0 0 12px; font-size:1.6rem; color:var(--accent2)}
  .score-big{font-size:3rem; font-weight:800; color:var(--accent); margin:14px 0 6px}
  .score-pct{font-size:1.1rem; color:var(--muted); margin-bottom:14px}
  .verdict{font-size:1.05rem; margin:14px 0 22px; padding:14px; border-radius:12px}
  .v-excellent{background:rgba(34,197,94,.12); color:var(--green)}
  .v-good{background:rgba(251,191,36,.12); color:var(--amber)}
  .v-needs-work{background:rgba(239,68,68,.12); color:var(--red)}
  .breakdown{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:18px 0; text-align:left;}
  .breakdown-item{background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px;}
  .breakdown-item .lbl{font-size:.8rem; color:var(--muted)}
  .breakdown-item .val{font-size:1.3rem; font-weight:700; margin-top:4px}

  code{background:var(--card2); padding:1px 6px; border-radius:4px; font-family:"SFMono-Regular",Consolas,monospace; font-size:.9em}

  /* table for state-transition tables embedded in questions */
  .stt-table{border-collapse:collapse; margin:8px 0; font-size:.88rem; background:var(--card2)}
  .stt-table th,.stt-table td{border:1px solid var(--border); padding:5px 10px; text-align:center}
  .stt-table th{background:#252d3d; color:var(--accent2)}

  @media(max-width:600px){
    body{padding:12px}
    .card{padding:16px 18px}
    h1{font-size:1.15rem}
    .breakdown{grid-template-columns:1fr}
    .stt-table{font-size:.78rem}
    .stt-table th,.stt-table td{padding:3px 6px}
  }
</style>
</head>

<script>
const questions = [
  // ============ PART 1: モデル化 + オートマトン định nghĩa (Yasashii 02-04) — 10 câu ============
  {
    id:1, diff:"easy",
    q:"**モデル化 (modeling / mô hình hoá)** là gì theo Yasashii?",
    ja:"モデル化の定義として正しいものはどれか。",
    options:[
      "Kỹ thuật xây dựng mô hình 3D bằng máy tính",
      "**Quá trình 単純化 (đơn giản hoá) các đối tượng phức tạp trong thế giới thực để dễ hiểu hơn — kết quả được gọi là モデル (mô hình)**",
      "Phương pháp kiểm thử phần mềm bằng các kịch bản giả lập",
      "Cách lưu trữ dữ liệu vào CSDL theo dạng quan hệ"
    ],
    correct:1,
    why:"Yasashii Lesson 02-04: 「モデル化とは、現実世界にある複雑なモノを単純化してわかりやすくすることです。単純化したものを『モデル』といいます」. Ví dụ: 地球儀 (quả địa cầu) là モデル化 của Trái Đất — đơn giản hoá đến mức chỉ giữ bề mặt.",
    whyWrong:{
      0:"Đó là 3D modeling, không phải khái niệm 「モデル化」 trong FE.",
      2:"Đó là テスト, không liên quan đến mô hình hoá.",
      3:"Đó là データベース設計, không phải モデル化."
    },
    topic:"FE Syllabus — 基礎理論 / モデル化 / Yasashii 02-04"
  },
  {
    id:2, diff:"easy",
    q:"**オートマトン (automaton)** là gì?",
    ja:"オートマトンの定義として最も適切なものはどれか。",
    options:[
      "Robot công nghiệp dùng trong nhà máy ô tô",
      "Một loại ngôn ngữ lập trình hướng đối tượng",
      "**Mô hình hệ thống biểu diễn chức năng bằng 3 thành phần: 「入力 (input)・状態 (state)・出力 (output)」**",
      "Phần mềm tự động hoá quy trình kinh doanh (RPA)"
    ],
    correct:2,
    why:"Yasashii 02-04: 「オートマトンとは、機能を『入力』『状態』『出力』の3つで表すシステムのモデルです」. Đây là mô hình toán học/lý thuyết tính toán dùng để mô tả các hệ thống có trạng thái thay đổi theo input.",
    whyWrong:{
      0:"Robot công nghiệp ≠ オートマトン trong lý thuyết FE.",
      1:"Không phải ngôn ngữ lập trình.",
      3:"RPA là kỹ thuật khác, không phải khái niệm オートマトン."
    },
    topic:"FE Syllabus — 基礎理論 / オートマトン / Yasashii 02-04"
  },
  {
    id:3, diff:"easy",
    q:"Trong từ điển Hy Lạp, **オートマトン** có nghĩa gốc là gì? (Yasashii ghi chú này)",
    ja:"オートマトンのギリシャ語の本来の意味はどれか。",
    options:[

      "**「自らの意思で動くもの」 (vật tự vận động theo ý chí riêng)**",
      "「電気で動くもの」 (vật chạy bằng điện)",
      "「人間を真似るもの」 (vật bắt chước con người)"
    ],
    correct:1,
    why:"Yasashii 02-04 もう少し詳しく: 「オートマトンとは、ギリシャ語で『自らの意思で動くもの』という意味です」. Nguồn gốc từ Hy Lạp 「αὐτόματον」 — tự động vận hành dựa trên trạng thái nội tại + input.",
    whyWrong:{
      0:"Không phải ý nghĩa gốc.",
      2:"Không liên quan đến nguồn gốc thuật ngữ.",
      3:"Cũng không phải nghĩa gốc tiếng Hy Lạp."
    },
    topic:"FE Syllabus — 基礎理論 / オートマトン / 語源"
  },
  {
    id:4, diff:"easy",
    q:"Trong ví dụ Yasashii về **máy bán hàng tự động (自動販売機)** — cấu thành オートマトン như thế nào?",
    ja:"自動販売機をオートマトンとしてモデル化する際、3要素の対応はどれか。",
    options:[
      "**入力 = お金 (tiền nhập vào) / 状態 = 入れたお金の合計金額 (tổng tiền đã đưa vào) / 出力 = 商品 (sản phẩm đẩy ra)**",
      "入力 = 商品 / 状態 = お金 / 出力 = ボタン",
      "入力 = ボタン / 状態 = 商品 / 出力 = お金",

    ],
    correct:0,
    why:"Yasashii Lesson 02-04 ví dụ cụ thể: 「自動販売機のオートマトンの『入力』『状態』『出力』は以下のとおりです。\n・入力 → 自動販売機に入れるお金\n・状態 → 入れたお金の合計金額\n・出力 → 自動販売機から出てくる商品」.",
    whyWrong:{

      3:"Hoàn toàn sai — không phải mô hình hoá automaton."
    },
    topic:"FE Syllabus — 基礎理論 / オートマトン / 自動販売機の例"
  },
  {
    id:5, diff:"easy",
    q:"Lợi ích chính của việc mô hình hoá hệ thống thành **オートマトン** là gì?",
    ja:"オートマトンでモデル化することのメリットはどれか。",
    options:[
      "Hệ thống chạy nhanh hơn",
      "Hệ thống tốn ít điện năng hơn",
      "**「複雑なシステムを単純化して表すことができる」 — biểu diễn hệ thống phức tạp dưới dạng đơn giản, dễ phân tích**",
      "Hệ thống không bao giờ bị lỗi"
    ],
    correct:2,
    why:"Yasashii: 「システムの本質的な機能を『入力』『状態』『出力』に分けて考えて、オートマトンとしてモデル化すると、複雑なシステムを単純化して表すことができます」. Lợi ích là về MẶT MÔ HÌNH/PHÂN TÍCH, không phải về hiệu năng vận hành.",
    whyWrong:{
      0:"Mô hình hoá không trực tiếp làm hệ thống chạy nhanh hơn.",
      1:"Không liên quan đến năng lượng.",
      3:"Sai — mô hình hoá không ngăn lỗi xảy ra."
    },
    topic:"FE Syllabus — 基礎理論 / オートマトン / メリット"
  },
  {
    id:6, diff:"mid",
    q:"Trong オートマトン, 「**受理状態 (受理状態 / accepting state)**」 là gì?",
    ja:"オートマトンにおける受理状態とは何か。",
    options:[
      "Trạng thái khởi đầu (初期状態) của automaton",
      "Trạng thái khi automaton bị lỗi và dừng",
      "**Trạng thái CUỐI CÙNG mà automaton đạt tới sau khi thực hiện chuỗi chuyển trạng thái — biểu thị bằng vòng tròn KÉP (二重丸)**",
      "Trạng thái trung gian được sử dụng nhiều nhất"
    ],
    correct:2,
    why:"Yasashii: 「オートマトンにおける『状態』は、時間や動作によって、初期状態からいくつかの状態を遷移して、最終的な状態に行き着きます。この最終的な状態を『受理状態』と呼びます」. Trong 状態遷移図, 受理状態 được biểu diễn bằng VÒNG TRÒN KÉP (二重丸).",
    whyWrong:{
      0:"Đó là 初期状態 (initial state), được biểu thị bằng mũi tên đậm chỉ vào.",
      1:"Không phải khái niệm 受理状態 — có thể là 「停止状態」 hoặc lỗi.",
      3:"Tần suất sử dụng không liên quan đến định nghĩa 受理状態."

    topic:"FE Syllabus — 基礎理論 / オートマトン / 受理状態"
  },
  {
    id:7, diff:"mid",
    q:"Trong 状態遷移図, các ký hiệu chuẩn được dùng như thế nào (theo bảng ký hiệu Yasashii)?",

    options:[

      "Mọi trạng thái được vẽ bằng hình thoi"
    ],
    correct:1,
    why:"Theo Yasashii bảng ký hiệu:\n• ○ vòng tròn: 状態 (state) — 二重丸 ⊙ = 受理状態.\n• ➡ mũi tên đậm: chỉ 初期状態 (initial state).\n• → mũi tên thường: 遷移 (transition).\n• Nhãn trên mũi tên: 入力/出力 (input/output).",

    options:[

    q:"Một automaton có thể có **bao nhiêu 受理状態** (accepting state)?",
    ja:"オートマトンの受理状態の数の制限はどれか。",
    options:[
      "Chỉ duy nhất 1 受理状態",
      "**0, 1, hoặc nhiều 受理状態 — tuỳ vào ngôn ngữ được nhận**",
      "Đúng bằng số 初期状態",
      "Phải là số chẵn"
    ],
    correct:1,
    why:"Số lượng 受理状態 không cố định:\n• Có thể có 0 (automaton không nhận chuỗi nào — trống).\n• Có thể có 1 (vd: \"chứa đúng pattern X\").\n• Có thể có nhiều (vd: \"chuỗi có độ dài chia hết cho 2 hoặc 3\").\nDuy nhất 1 初期状態, NHƯNG nhiều 受理状態 được phép.",
    whyWrong:{
      0:"Sai — có thể có nhiều.",
      2:"Không có quan hệ này.",
      3:"Hoàn toàn vô lý."
    },
    topic:"FE Syllabus — 基礎理論 / オートマトン / 受理状態の数"
  },
  {
    id:40, diff:"hard",
    q:"Tổng kết: chiến lược tốt nhất để học **オートマトン** cho kỳ thi FE là gì?",
    ja:"FE試験でオートマトンを習得するベスト戦略はどれか。",
    options:[
      "Học thuộc lý thuyết DFA/NFA hình thức",
      "**(1) Nắm chắc định nghĩa 入力・状態・出力; (2) Hiểu ý nghĩa 初期/受理状態 và ký hiệu (○, 二重丸, mũi tên); (3) Luyện tape trace input string qua nhiều bài 過去問; (4) Tập đọc cả 状態遷移表 và 状態遷移図**",
      "Chỉ học công thức",
      "Tự vẽ automaton mới mà không cần đọc đề"
    ],
    correct:1,
    why:"Phối hợp 4 yếu tố:\n1. **Khái niệm**: hiểu rõ 入力/状態/出力 (Yasashii 02-04).\n2. **Ký hiệu**: ○ = state, ⊙ = 受理, ➡ = 初期, → = 遷移.\n3. **Trace skill**: thực hành nhiều 過去問 (平成26, 28, 30...) bằng cách trace từng ký tự.\n4. **Cả 2 biểu diễn**: bảng (状態遷移表) và sơ đồ (状態遷移図) — phải đọc được cả 2.\nSlide 1 第9回 và Yasashii 02-04 cung cấp đủ phương pháp này.",
    whyWrong:{
      0:"Không cần lý thuyết hình thức cho FE — chỉ cần trace.",
      2:"Không có \"công thức\" — chỉ có quy tắc đọc/trace.",
      3:"Vẽ mà không hiểu đề không có giá trị thi."
    },
    topic:"FE Syllabus — 基礎理論 / オートマトン / 学習戦略"
  }
];

// ===== State =====
let current = 0;
let answers = new Array(questions.length).fill(null);

const quizArea = document.getElementById('quiz-area');
const resultArea = document.getElementById('result-area');
const progressText = document.getElementById('progress-text');
const progressFill = document.getElementById('progress-fill');
const answeredCount = document.getElementById('answered-count');
const progressWrap = document.getElementById('progress-wrap');

function diffClass(d){return d==='easy'?'diff-easy':d==='mid'?'diff-mid':'diff-hard'}
function diffLabel(d){return d==='easy'?'[Dễ / 易]':d==='mid'?'[TB / 中]':'[Khó / 難]'}

function render(){
  if(current >= questions.length){renderResult(); return;}
  const q = questions[current];
  const a = answers[current];
  const locked = a !== null;

  const opts = q.options.map((opt, i) => {
    let cls = 'option';
    if(locked){
      cls += ' locked';
      if(i === q.correct) cls += ' correct';
      else if(i === a) cls += ' wrong';
    }
    return `<div class="${cls}" data-idx="${i}">
      <div class="key">${String.fromCharCode(65+i)}</div>
      <div class="body">${opt}</div>
    </div>`;
  }).join('');

  let expHtml = '';
  if(locked){
    const wrongList = Object.keys(q.whyWrong).map(k=>{
      return `<p><span class="label">${String.fromCharCode(65+(+k))}.</span> ${q.whyWrong[k]}</p>`;
    }).join('');
    expHtml = `
      <div class="explanation" id="exp">
        <h4>💡 Giải thích</h4>
        <p><span class="label">Đáp án đúng:</span> ${String.fromCharCode(65+q.correct)}</p>
        <p><span class="label">Vì sao đúng:</span> ${q.why.replace(/\n/g,'<br>')}</p>
        <p><span class="label">Vì sao các phương án còn lại sai:</span></p>
        ${wrongList}
        <div class="topic">📚 <strong>Liên hệ FE:</strong> ${q.topic}</div>
      </div>`;
  }

  quizArea.innerHTML = `
    <div class="card">
      <span class="difficulty ${diffClass(q.diff)}">${diffLabel(q.diff)}</span>
      <p class="question"><strong>Câu ${q.id}.</strong> ${q.q.replace(/\n/g,'<br>')}
        <span class="ja">${q.ja}</span></p>
      <div class="options">${opts}</div>
      ${expHtml}
      <div class="actions">
        <button class="secondary" id="prev-btn" ${current===0?'disabled':''}>← Câu trước</button>
        ${locked ? `<button id="toggle-exp" class="amber">Xem / Ẩn giải thích</button>` : ''}
        <button id="next-btn" ${!locked?'disabled':''}>${current===questions.length-1?'Kết thúc & Xem kết quả':'Câu tiếp →'}</button>
      </div>
    </div>
  `;

  if(!locked){
    quizArea.querySelectorAll('.option').forEach(el=>{
      el.addEventListener('click', ()=>{
        const idx = +el.dataset.idx;
        answers[current] = idx;
        render();
        updateProgress();
      });
    });
  }

  document.getElementById('prev-btn').addEventListener('click', ()=>{if(current>0){current--; render(); updateProgress();}});
  document.getElementById('next-btn').addEventListener('click', ()=>{current++; render(); updateProgress();});
  const tex = document.getElementById('toggle-exp');
  if(tex){
    const expDiv = document.getElementById('exp');
    expDiv.classList.add('show');
    tex.addEventListener('click', ()=>{ expDiv.classList.toggle('show'); });
  }
}

function updateProgress(){
  if(current >= questions.length){
    progressWrap.style.display = 'none';
    return;
  }
  progressText.textContent = `Câu ${current+1} / ${questions.length}`;
  const answered = answers.filter(a=>a!==null).length;
  answeredCount.textContent = `Đã trả lời: ${answered}`;
  progressFill.style.width = ((current+1)/questions.length*100)+'%';
}

function renderResult(){
  quizArea.style.display='none';
  resultArea.style.display='block';
  progressWrap.style.display='none';

  const totals = {easy:{c:0,t:0}, mid:{c:0,t:0}, hard:{c:0,t:0}};
  let score = 0;
  questions.forEach((q,i)=>{
    totals[q.diff].t++;
    if(answers[i]===q.correct){score++; totals[q.diff].c++;}
  });
  const pct = Math.round(score/questions.length*100);
  let verdict, vClass;
  if(pct >= 80){verdict='🌟 Xuất sắc! Em đã nắm chắc オートマトン・状態遷移 — sẵn sàng cho 科目A!'; vClass='v-excellent'}
  else if(pct >= 60){verdict='👍 Khá tốt! Cần luyện thêm phần trace chuỗi qua 状態遷移図.'; vClass='v-good'}
  else{verdict='💪 Cần cố gắng thêm! Hãy ôn lại Yasashii 02-04 + Slide 1 第9回 rồi luyện trace từng ký tự.'; vClass='v-needs-work'}

  resultArea.innerHTML = `
    <div class="card result">
      <h2>🎉 Hoàn thành bài kiểm tra!</h2>
      <div class="score-big">${score} / ${questions.length}</div>
      <div class="score-pct">Đạt ${pct}%</div>
      <div class="verdict ${vClass}">${verdict}</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="lbl">🟢 Dễ / 易</div>
          <div class="val">${totals.easy.c} / ${totals.easy.t}</div>
        </div>
        <div class="breakdown-item">
          <div class="lbl">🟡 TB / 中</div>
          <div class="val">${totals.mid.c} / ${totals.mid.t}</div>
        </div>
        <div class="breakdown-item">
          <div class="lbl">🔴 Khó / 難</div>
          <div class="val">${totals.hard.c} / ${totals.hard.t}</div>
        </div>
      </div>
      <button id="restart-btn">🔁 Làm lại từ đầu</button>
      <button class="secondary" id="review-btn">📖 Xem lại bài</button>
    </div>
  `;
  document.getElementById('restart-btn').addEventListener('click', ()=>{
    current=0; answers=new Array(questions.length).fill(null);
    quizArea.style.display='block'; resultArea.style.display='none'; progressWrap.style.display='block';
    render(); updateProgress();
  });
  document.getElementById('review-btn').addEventListener('click', ()=>{
    current=0;
    quizArea.style.display='block'; resultArea.style.display='none'; progressWrap.style.display='block';
    render(); updateProgress();
  });
}

render();
updateProgress();
</script>
</body>
</html>
