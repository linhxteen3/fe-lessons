<html lang="vi">
<head>
<meta charset="UTF-8">

<style>
:root{
  --bg:#0f1419; --panel:#1a2027; --panel2:#232a33; --border:#2e3744;
  --text:#e6edf3; --muted:#8b98a5; --accent:#58a6ff; --accent2:#a78bfa;
  --green:#3fb950; --red:#f85149; --yellow:#d29922;
  --green-bg:rgba(63,185,80,.18); --red-bg:rgba(248,81,73,.18);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;line-height:1.6;padding:16px}
.wrap{max-width:880px;margin:0 auto}
header{background:linear-gradient(135deg,#1f2937,#581c87);padding:20px;border-radius:12px;border:1px solid var(--border);margin-bottom:16px}
h1{margin:0 0 6px;font-size:1.4em;color:#fff}
.sub{color:#cbd5e1;font-size:.92em}
.bar{height:8px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:12px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .3s}
.meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:.9em;color:#cbd5e1;flex-wrap:wrap;gap:8px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.qhead{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.qnum{background:var(--accent);color:#0b1220;padding:4px 10px;border-radius:6px;font-weight:700;font-size:.9em}
.diff{padding:3px 9px;border-radius:6px;font-size:.78em;font-weight:600}
.d-easy{background:rgba(63,185,80,.2);color:#7ee787}
.d-med{background:rgba(210,153,34,.2);color:#e3b341}
.d-hard{background:rgba(248,81,73,.2);color:#ff7b72}
.qtext{font-size:1.05em;margin-bottom:14px;white-space:pre-wrap}
.qtext .jp{display:block;color:var(--muted);font-size:.92em;margin-top:6px;border-left:3px solid var(--border);padding-left:10px}
.options{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--panel2);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;font-size:.98em}
.opt:hover:not(.locked){background:#2d3540;border-color:var(--accent)}
.opt.locked{cursor:default}
.opt .lbl{font-weight:700;color:var(--accent);min-width:22px}
.opt.correct{background:var(--green-bg);border-color:var(--green)}
.opt.correct .lbl{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}
.opt.wrong .lbl{color:var(--red)}
.opt.disabled{opacity:.55}
.explain{margin-top:14px;background:#11161d;border-left:4px solid var(--accent2);border-radius:6px;padding:14px;display:none}
.explain.show{display:block}
.explain h4{margin:0 0 8px;color:var(--accent2);font-size:1em}
.explain p{margin:4px 0;font-size:.94em}
.explain code{background:#0b1018;padding:1px 6px;border-radius:4px;color:#79c0ff;font-family:"SF Mono",Consolas,monospace}
.nav{display:flex;gap:10px;justify-content:space-between;margin-top:14px}
button{background:var(--accent);color:#0b1220;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.95em;font-family:inherit}
button:hover{filter:brightness(1.1)}
button:disabled{opacity:.4;cursor:not-allowed}
button.ghost{background:transparent;color:var(--text);border:1.5px solid var(--border)}
button.ghost:hover{background:var(--panel2)}
.qjump{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-top:14px}
.qjump button{padding:6px 0;font-size:.82em;background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.qjump button.done{background:var(--green-bg);border-color:var(--green);color:#7ee787}
.qjump button.miss{background:var(--red-bg);border-color:var(--red);color:#ff7b72}
.qjump button.cur{outline:2px solid var(--accent)}
.result{text-align:center;padding:30px 20px}
.score{font-size:3em;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;margin:10px 0}
.verdict{font-size:1.2em;margin:10px 0}
.bk{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.bk-card{background:var(--panel2);border-radius:8px;padding:12px;border:1px solid var(--border)}
.bk-card .n{font-size:1.5em;font-weight:700;margin:4px 0}
.hidden{display:none}
@media(max-width:600px){
  .qjump{grid-template-columns:repeat(8,1fr)}
  .bk{grid-template-columns:1fr}
  h1{font-size:1.15em}
}
</style>

<script>
const Q = [
  // ====== DỄ (12 câu) ======
  {d:"easy",
   q:"なぜコンピュータは負の数を表現する必要があるのか。\nVì sao máy tính phải biểu diễn được số âm?",
   o:["コンピュータは足し算しかできず、引き算を負の数の足し算として処理するため","引き算回路が高速だから","負の数の方がメモリを節約できるから","小数を表すため"],
   a:0,
   why:"Slide 第3回: コンピュータは足し算しかできないので、引き算は負の数の足し算として考える.",
   wrong:["B: Sai, máy không có \"mạch trừ riêng\".","C: Không liên quan tiết kiệm bộ nhớ.","D: Số âm khác với số thập phân."],

  {d:"easy",
   q:"2進数で符号を表すのに使われるビットはどれか。\nBit nào được dùng làm bit dấu trong 2進số?",

   ref:"基礎理論 / 補数の定義"},

  {d:"easy",

   a:0,
   why:"Slide (要暗記): 2の補数の作り方は2進数をビット反転して1を加える.",
   wrong:["B: Đảo thứ tự cho kết quả khác.","C: Không có quy tắc nhân 2.","D: Phải đảo TẤT CẢ bit."],
   ref:"基礎理論 / 2の補数の作り方"},

  {d:"easy",
   q:"「1の補数」とは、2進数に対して何をした結果か。\n\"1の補数\" là kết quả của thao tác nào?",

   a:0,

  {d:"easy",
   q:"10進数「450」の10の補数はいくつか。\n10の補数 của 450 (3 chữ số) là?",

  {d:"easy",

   ref:"基礎理論 / 9の補数"},

  {d:"easy",
   q:"8ビットの符号無2進数で表現できる数値の範囲はどれか。\nPhạm vi 2進 8 bit KHÔNG dấu là?",
   o:["0 ~ 255","−128 ~ +127","0 ~ 127","−255 ~ +255"],
   a:0,
   why:"符号無 (unsigned): 0 ~ 2⁸−1 = 0 ~ 255. Bảng Slide xác nhận 11111111 = 255.",
   wrong:["B: Đó là signed.","C: Đó là 7 bit unsigned.","D: Không có khái niệm này."],
   ref:"基礎理論 / 符号無2進数"},

  {d:"easy",
   q:"8ビットの符号付2進数（2の補数表現）で表現できる範囲はどれか。\nPhạm vi 2進 8 bit có dấu (bù 2) là?",
   o:["−128 ~ +127","−127 ~ +128","0 ~ 255","−255 ~ 0"],
   a:0,
   why:"Signed (bù 2): −2⁷ ~ 2⁷−1 = −128 ~ +127. Bảng Slide: 10000000 = −128, 01111111 = +127.",
   wrong:["B: Lệch 1: max âm là −128 chứ không phải −127.","C: Đó là unsigned.","D: Không có khái niệm này."],
   ref:"基礎理論 / 符号付2進数"},

  {d:"easy",
   q:"2の補数表現において「00000000」は10進数で何を表すか。\n00000000 (8 bit, bù 2) là số 10進 nào?",
   o:["0","256","−128","−0"],
   a:0,
   why:"Bảng Slide: 00000000 → 0 (cả signed lẫn unsigned).",
   wrong:["B: 256 vượt phạm vi 8 bit.","C: Đó là 10000000.","D: Không có khái niệm \"âm 0\" trong bù 2 (đây là ưu điểm)."],
   ref:"基礎理論 / 8ビット範囲表"},

  // ====== TB (16 câu) ======
  {d:"med",
   q:"2進数「1100101」の1の補数はどれか。\n1の補数 của 2進 1100101 là?",
   o:["0011010","0011011","1100100","1100110"],
   a:0,
   why:"Slide ví dụ: ビット反転 → 0011010 = 1の補数.",
   wrong:["B: 0011011 là 2の補数 (đã +1).","C: Chỉ đảo bit cuối, sai.","D: Không phải đảo bit."],
   ref:"基礎理論 / 1の補数 ví dụ"},

  {d:"med",
   q:"2進数「1100101」の2の補数はどれか。\n2の補数 của 2進 1100101 là?",
   o:["0011011","0011010","1100100","0011100"],
   a:0,
   why:"Slide: 1の補数 = 0011010, +1 → 0011011 = 2の補数.",
   wrong:["B: Mới chỉ làm bước 1 (bù 1).","C: Sai phương pháp.","D: +2 thay vì +1."],
   ref:"基礎理論 / 2の補数 ví dụ"},

  {d:"med",
   q:"符号付8ビット2進数「11111111」を10進数で表すといくつか。\n11111111 (8 bit, bù 2) = ?",
   o:["−1","255","−127","−255"],
   a:0,
   why:"Bảng Slide: 11111111 (符号付) = −1. Kiểm: 1+(−1)=0 → 00000001+11111111 = 1 00000000, bỏ carry = 0 ✓.",
   wrong:["B: 255 là cách hiểu unsigned.","C: −127 là 10000001.","D: Sai biểu diễn."],
   ref:"基礎理論 / 符号付8ビット"},

  {d:"med",
   q:"符号付8ビット2進数「10000000」を10進数で表すといくつか。\n10000000 (8 bit, bù 2) = ?",
   o:["−128","128","−127","0"],
   a:0,
   why:"Bảng Slide: 10000000 (符号付) = −128. Đây là số âm nhỏ nhất biểu diễn được.",
   wrong:["B: 128 là cách hiểu unsigned.","C: −127 là 10000001.","D: 0 là 00000000."],
   ref:"基礎理論 / 符号付8ビット"},

  {d:"med",
   q:"符号付8ビット2進数「10000001」を10進数で表すといくつか。\n10000001 (8 bit, bù 2) = ?",
   o:["−127","129","−129","−1"],
   a:0,
   why:"Bảng Slide: 10000001 (符号付) = −127.",
   wrong:["B: 129 là unsigned.","C: −129 vượt phạm vi.","D: −1 là 11111111."],
   ref:"基礎理論 / 符号付8ビット"},

  {d:"med",
   q:"符号付8ビット2進数「11111110」を10進数で表すといくつか。\n11111110 (8 bit, bù 2) = ?",
   o:["−2","254","−128","−254"],
   a:0,
   why:"Bảng Slide: 11111110 (符号付) = −2. Kiểm: 2 + (−2) = 0 → 00000010 + 11111110 = 1 00000000, bỏ carry ✓.",
   wrong:["B: 254 là unsigned.","C: −128 là 10000000.","D: Vượt phạm vi."],
   ref:"基礎理論 / 符号付8ビット"},

  {d:"med",
   q:"10進数「+24」を8ビット2進数で表すとどれか。\n+24 ở 2進 8 bit?",
   o:["00011000","11101000","00001100","00110000"],
   a:0,
   why:"24 = 16 + 8 = 2⁴ + 2³ → 00011000. Kiểm với Slide: 1の補数 0001 0111, +1 = 0001 1000 = 24.",
   wrong:["B: Đó là −24 (bù 2 của +24).","C: 00001100 = 12.","D: 00110000 = 48."],
   ref:"基礎理論 / +24 biểu diễn"},

  {d:"med",
   q:"10進数「−24」を8ビット2進数（2の補数）で表すとどれか。\n−24 ở 2進 8 bit (bù 2)?",
   o:["11101000","00011000","10011000","11100111"],
   a:0,
   why:"Slide ví dụ: +24 = 00011000 → bit phản 11100111 (1の補数) → +1 = 11101000 = −24.",
   wrong:["B: Đó là +24.","C: Sai biểu diễn.","D: 11100111 chỉ là 1の補数, chưa +1."],
   ref:"基礎理論 / −24 ví dụ Slide"},

  {d:"med",
   q:"10進数「−1」を8ビット2進数（2の補数）で表すとどれか。\n−1 ở 2進 8 bit (bù 2)?",
   o:["11111111","10000001","00000001","11111110"],
   a:0,
   why:"+1 = 00000001 → đảo bit 11111110 → +1 = 11111111. Khớp bảng Slide.",
   wrong:["B: 10000001 = −127.","C: Đó là +1.","D: 11111110 = −2."],
   ref:"基礎理論 / −1 biểu diễn"},

  {d:"med",
   q:"10進数「−128」を8ビット2進数（2の補数）で表すとどれか。\n−128 ở 2進 8 bit (bù 2)?",
   o:["10000000","11111111","10000001","11000000"],
   a:0,
   why:"Bảng Slide: 10000000 (符号付) = −128. Đây là biên dưới của phạm vi.",
   wrong:["B: 11111111 = −1.","C: 10000001 = −127.","D: 11000000 = −64."],
   ref:"基礎理論 / −128 biểu diễn"},

  {d:"med",
   q:"4ビットの符号付2進数で表現できる範囲はどれか。\nPhạm vi 2進 4 bit có dấu (bù 2)?",
   o:["−8 ~ +7","−7 ~ +8","0 ~ 15","−15 ~ +15"],
   a:0,
   why:"n=4: −2³ ~ 2³−1 = −8 ~ +7. Tổng quát hóa từ công thức 8 bit của Slide.",
   wrong:["B: Lệch 1 ở biên.","C: Đó là unsigned 4 bit.","D: Sai công thức."],
   ref:"基礎理論 / n bit signed"},

  {d:"med",
   q:"2進数の引き算「1010 − 0011」を2の補数で計算する場合、まず何をするか。\nTrừ 1010 − 0011 (bù 2), bước đầu tiên?",
   o:["0011 の2の補数を作る","1010 の2の補数を作る","両方を反転する","左シフトする"],
   a:0,
   why:"Quy trình: 引く数 (0011) を補数で表現 → bù 2 của 0011. 0011 → đảo 1100 → +1 = 1101.",

  {d:"med",
   q:"2進数 1010 (=10) − 0011 (=3) を2の補数で計算した結果はどれか（4ビット）。\nTính 1010 − 0011 bằng bù 2 (4 bit)?",
   o:["0111 (=7)","1110 (=14)","1101","0011"],
   a:0,
   why:"0011 → bù 2 = 1101. 1010 + 1101 = 10111 (5 bit). Bỏ carry trái → 0111 = 7. ✓ Khớp 10−3=7.",
   wrong:["B: Sai phép tính.","C: Đây là bù 2 của 0011, chưa cộng.","D: Bù 1 không đúng kết quả."],
   ref:"基礎理論 / 引き算 calculation"},

  {d:"med",
   q:"8ビット符号付2進数 00000010 (+2) と 11111110 (−2) を加算すると結果はどれか。\nCộng +2 và −2 ở 8 bit?",
   o:["00000000 (=0)","11111111 (=−1)","00000010","オーバーフロー"],
   a:0,
   why:"00000010 + 11111110 = 1 00000000 (9 bit). Bỏ carry → 00000000 = 0. Đúng vì 2 + (−2) = 0.",

   q:"なぜ「2の補数」は引き算回路を不要にできるのか。\nVì sao 2の補数 giúp loại bỏ mạch trừ?",
   o:["引き算が「補数による加算」に置き換えられるから","2進数は最初から負の数を持っているから","CPU が自動で減算するから","補数は常にゼロだから"],
   a:0,
   why:"Slide: 引く数を補数で表現し足し算 → chỉ cần mạch cộng, không cần mạch trừ.",

  {d:"med",
   q:"符号無8ビット2進数「11111111」は10進数でいくつか。\n11111111 (8 bit, không dấu) = ?",

   a:0,
   why:"4 bit unsigned: 1000 = 8. 4 bit signed (bù 2): 1000 = −8. Hiệu = 8 − (−8) = 16 = 2⁴. Tổng quát n bit: hiệu = 2ⁿ khi bit dấu = 1.",

let cur=0, ans=new Array(Q.length).fill(null);

function renderJump(){
  const j=document.getElementById('jump'); j.innerHTML='';
  Q.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    if(ans[i]!==null){ b.className = ans[i]===Q[i].a ? 'done' : 'miss'; }
    if(i===cur) b.className=(b.className+' cur').trim();
    b.onclick=()=>{cur=i; render();};
    j.appendChild(b);
  });
}

function updateMeta(){
  document.getElementById('cur').textContent=cur+1;
  const done=ans.filter(x=>x!==null).length;
  const ok=ans.filter((x,i)=>x!==null && x===Q[i].a).length;
  document.getElementById('done').textContent=done;
  document.getElementById('ok').textContent=ok;
  document.getElementById('ng').textContent=done-ok;
  document.getElementById('bar').style.width = (done/Q.length*100)+'%';
}

function render(){
  document.getElementById('result').classList.add('hidden');
  const q=Q[cur];
  const dCls = q.d==='easy'?'d-easy':q.d==='med'?'d-med':'d-hard';
  const dTxt = q.d==='easy'?'易 Dễ':q.d==='med'?'中 TB':'難 Khó';
  const parts = q.q.split('\n');
  const vi = parts[0], jp = parts[1]||'';
  let html = `<div class="card">
    <div class="qhead">
      <span class="qnum">Câu ${cur+1}/40</span>
      <span class="diff ${dCls}">${dTxt}</span>
    </div>
    <div class="qtext">${vi}<span class="jp">🇯🇵 ${jp}</span></div>
    <div class="options">`;
  const letters=['A','B','C','D'];
  q.o.forEach((opt,i)=>{
    let cls='opt';
    if(ans[cur]!==null){
      cls+=' locked disabled';
      if(i===q.a) cls+=' correct';
      else if(i===ans[cur]) cls+=' wrong';
    }
    html+=`<div class="${cls}" data-i="${i}"><span class="lbl">${letters[i]}.</span><span>${opt}</span></div>`;
  });
  html+=`</div>`;

  if(ans[cur]!==null){
    const correct=ans[cur]===q.a;
    html+=`<button class="ghost" id="toggleEx" style="margin-top:14px">📖 ${correct?'Xem giải thích':'Xem giải thích chi tiết'}</button>
    <div class="explain" id="ex">
      <h4>Đáp án đúng: ${letters[q.a]}</h4>
      <p><strong>Vì sao đúng:</strong> ${q.why}</p>
      <p><strong>Vì sao các phương án còn lại sai:</strong></p>
      ${q.wrong.map(w=>`<p style="margin-left:12px">• ${w}</p>`).join('')}
      <p style="margin-top:8px;color:var(--muted);font-size:.88em"><strong>📌 FE Syllabus:</strong> ${q.ref}</p>
    </div>`;
  }

  html+=`<div class="nav">
    <button class="ghost" ${cur===0?'disabled':''} onclick="cur--;render()">← Câu trước</button>
    ${cur===Q.length-1
      ? `<button onclick="showResult()">✅ Nộp bài</button>`
      : `<button onclick="cur++;render()">Câu tiếp →</button>`}
  </div></div>`;
  document.getElementById('quiz').innerHTML=html;

  document.querySelectorAll('.opt:not(.locked)').forEach(el=>{
    el.onclick=()=>{
      ans[cur]=parseInt(el.dataset.i);
      render();
    };
  });
  const tg=document.getElementById('toggleEx');
  if(tg) tg.onclick=()=>document.getElementById('ex').classList.toggle('show');

  updateMeta(); renderJump();
}

function showResult(){
  document.getElementById('quiz').innerHTML='';
  const ok=ans.filter((x,i)=>x!==null && x===Q[i].a).length;
  const pct=Math.round(ok/Q.length*100);
  const buckets={easy:[0,0],med:[0,0],hard:[0,0]};
  Q.forEach((q,i)=>{
    buckets[q.d][1]++;
    if(ans[i]===q.a) buckets[q.d][0]++;
  });
  let verdict, color;
  if(pct>=80){verdict='🏆 Xuất sắc — vững 補数表現!'; color='var(--green)';}
  else if(pct>=60){verdict='👍 Khá — đạt ngưỡng FE, ôn thêm vài chỗ.'; color='var(--accent)';}
  else if(pct>=40){verdict='⚠️ Trung bình — luyện thêm phần bù 2 và phạm vi.'; color='var(--yellow)';}
  else {verdict='💪 Cần cố gắng — học lại Slide 1 第3回 trước.'; color='var(--red)';}
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('result').innerHTML=`
    <h2 style="margin-top:0">Kết quả</h2>
    <div class="score">${ok} / 40</div>
    <div style="color:var(--muted)">${pct}% đúng</div>
    <div class="verdict" style="color:${color}">${verdict}</div>
    <div class="bk">
      <div class="bk-card"><div style="color:#7ee787">易 Dễ</div><div class="n">${buckets.easy[0]}/${buckets.easy[1]}</div></div>
      <div class="bk-card"><div style="color:#e3b341">中 TB</div><div class="n">${buckets.med[0]}/${buckets.med[1]}</div></div>
      <div class="bk-card"><div style="color:#ff7b72">難 Khó</div><div class="n">${buckets.hard[0]}/${buckets.hard[1]}</div></div>
    </div>
    <button onclick="reset()">🔁 Làm lại từ đầu</button>
    <button class="ghost" onclick="cur=0;render()" style="margin-left:8px">📝 Xem lại từng câu</button>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

function reset(){
  ans=new Array(Q.length).fill(null); cur=0; render();
}

render();
</script>
