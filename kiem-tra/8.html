<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE Exam — AI + 確率 (xác suất / hoán vị / tổ hợp / kỳ vọng)</title>
<style>
  :root{
    --bg:#0f1218; --card:#171c26; --card2:#1f2632; --accent:#4f8cff; --accent2:#6cd4ff;
    --green:#22c55e; --red:#ef4444; --amber:#fbbf24;
    --text:#e6e9ef; --muted:#9aa3b2; --border:#2a3140;
    --easy:#22c55e; --mid:#fbbf24; --hard:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:20px; font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
    background:linear-gradient(135deg,#0f1218 0%,#141a26 100%); color:var(--text); min-height:100vh;
    line-height:1.6;
  }
  .container{max-width:880px; margin:0 auto;}
  header{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px 24px; margin-bottom:16px;}
  h1{margin:0 0 6px; font-size:1.35rem; color:var(--accent2)}
  .subtitle{color:var(--muted); font-size:.9rem; margin:0}
  .meta{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:.85rem; color:var(--muted)}
  .meta span{background:var(--card2); padding:4px 10px; border-radius:8px; border:1px solid var(--border)}

  .progress-wrap{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:14px;}
  .progress-info{display:flex; justify-content:space-between; font-size:.9rem; margin-bottom:8px}
  .progress-bar{height:8px; background:var(--card2); border-radius:99px; overflow:hidden}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0; transition:width .3s}

  .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px 24px; margin-bottom:14px;}
  .difficulty{display:inline-block; padding:2px 10px; border-radius:99px; font-size:.78rem; font-weight:600; margin-bottom:10px;}
  .diff-easy{background:rgba(34,197,94,.15); color:var(--easy); border:1px solid rgba(34,197,94,.4)}
  .diff-mid{background:rgba(251,191,36,.15); color:var(--mid); border:1px solid rgba(251,191,36,.4)}
  .diff-hard{background:rgba(239,68,68,.15); color:var(--hard); border:1px solid rgba(239,68,68,.4)}

  .question{font-size:1.02rem; margin:0 0 16px; white-space:pre-wrap}
  .question .ja{display:block; color:var(--muted); font-size:.88rem; margin-top:6px; padding-left:8px; border-left:2px solid var(--border)}

  .options{display:flex; flex-direction:column; gap:8px}
  .option{background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; cursor:pointer; transition:all .15s; display:flex; align-items:flex-start; gap:10px; user-select:none;}
  .option:hover:not(.locked){border-color:var(--accent); background:#222a39}
  .option .key{flex:none; width:26px; height:26px; border-radius:50%; background:var(--border); display:grid; place-items:center; font-weight:700; font-size:.85rem;}
  .option .body{flex:1}
  .option.correct{background:rgba(34,197,94,.12); border-color:var(--green)}
  .option.correct .key{background:var(--green); color:#fff}
  .option.wrong{background:rgba(239,68,68,.12); border-color:var(--red)}
  .option.wrong .key{background:var(--red); color:#fff}
  .option.locked{cursor:not-allowed; opacity:.85}
  .option.locked:hover{border-color:var(--border)}
  .option.correct.locked, .option.wrong.locked{opacity:1}

  .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px}
  button{background:var(--accent); color:#fff; border:0; border-radius:10px; padding:10px 18px; font-size:.95rem; font-weight:600; cursor:pointer; transition:opacity .15s, transform .05s;}
  button:hover:not(:disabled){opacity:.9}
  button:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.4; cursor:not-allowed}
  button.secondary{background:var(--card2); color:var(--text); border:1px solid var(--border)}
  button.amber{background:var(--amber); color:#1a1a1a}

  .explanation{margin-top:14px; padding:14px 16px; border-radius:10px; background:var(--card2); border-left:3px solid var(--accent2); display:none;}
  .explanation.show{display:block}
  .explanation h4{margin:0 0 8px; font-size:.95rem; color:var(--accent2)}
  .explanation p{margin:6px 0; font-size:.92rem}
  .explanation .label{color:var(--accent2); font-weight:600}
  .explanation .topic{margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); font-size:.85rem; color:var(--muted);}
  .formula{background:#0d1119; padding:8px 12px; border-radius:6px; display:inline-block; font-family:"SFMono-Regular",Consolas,monospace; font-size:.9em; margin:4px 0}

  .result{text-align:center; padding:36px 24px}
  .result h2{margin:0 0 12px; font-size:1.6rem; color:var(--accent2)}
  .score-big{font-size:3rem; font-weight:800; color:var(--accent); margin:14px 0 6px}
  .score-pct{font-size:1.1rem; color:var(--muted); margin-bottom:14px}
  .verdict{font-size:1.05rem; margin:14px 0 22px; padding:14px; border-radius:12px}
  .v-excellent{background:rgba(34,197,94,.12); color:var(--green)}
  .v-good{background:rgba(251,191,36,.12); color:var(--amber)}
  .v-needs-work{background:rgba(239,68,68,.12); color:var(--red)}
  .breakdown{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:18px 0; text-align:left;}
  .breakdown-item{background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px;}
  .breakdown-item .lbl{font-size:.8rem; color:var(--muted)}
  .breakdown-item .val{font-size:1.3rem; font-weight:700; margin-top:4px}

  code{background:var(--card2); padding:1px 6px; border-radius:4px; font-family:"SFMono-Regular",Consolas,monospace; font-size:.9em}

  @media(max-width:600px){
    body{padding:12px}
    .card{padding:16px 18px}
    h1{font-size:1.15rem}
    .breakdown{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>FE Exam — AI + 確率（xác suất・hoán vị・tổ hợp・kỳ vọng）</h1>
    <p class="subtitle">Yasashii Ch.2 Lesson 02-05 AI + Ch.20 Lesson 20-03 期待値 + Slide 1 第10回</p>
    <div class="meta">
      <span>📝 40 câu</span>
      <span>⏱ 30 phút</span>
      <span>🎯 Phong cách IPA</span>
      <span>🟢 12 Dễ • 🟡 16 TB • 🔴 12 Khó</span>
    </div>
  </header>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-info">
      <span id="progress-text">Câu 1 / 40</span>
      <span id="answered-count">Đã trả lời: 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div id="quiz-area"></div>
  <div id="result-area" style="display:none"></div>
</div>

<script>
const questions = [
  // ============ PART 1: AI - 人工知能 (Yasashii 02-05) — 12 câu ============
  {
    id:1, diff:"easy",
    q:"**AI（人工知能 / Artificial Intelligence）** được định nghĩa như thế nào theo Yasashii?",
    ja:"AI（人工知能）の定義として最も適切なものはどれか。",
    options:[
      "Kỹ thuật giúp máy tính tự sinh ra điện năng",
      "Kỹ thuật tái hiện **「人間の知的なふるまい」 (hành vi trí tuệ của con người)** trên máy tính",
      "Phần cứng đặc biệt dùng cho siêu máy tính",
      "Thuật toán sắp xếp dữ liệu nhanh nhất hiện nay"
    ],
    correct:1,
    why:"Theo Yasashii Lesson 02-05: 「AI（人工知能）とは人間の知的なふるまいを、コンピュータ上に再現する技術」 — AI là kỹ thuật tái hiện hành vi trí tuệ của con người trên máy tính.",
    whyWrong:{
      0:"Không liên quan đến điện năng.",
      2:"AI là khái niệm kỹ thuật, không phải phần cứng cụ thể.",
      3:"Đó là khái niệm thuật toán sắp xếp (sort), không phải AI."
    },
    topic:"FE Syllabus — 基礎理論 / AI（人工知能）/ Yasashii 02-05"
  },
  {
    id:2, diff:"easy",
    q:"Mối quan hệ giữa **AI, 機械学習 (machine learning), ニューラルネットワーク, ディープラーニング (deep learning)** là gì?",
    ja:"AI、機械学習、ニューラルネットワーク、ディープラーニングの包含関係はどれか。",
    options:[
      "4 khái niệm tách biệt, không liên quan",
      "AI ⊃ 機械学習 ⊃ ディープラーニング (deep learning là một loại của machine learning, machine learning là một cách hiện thực AI); ニューラルネットワーク là kỹ thuật mà deep learning sử dụng",
      "ディープラーニング ⊃ AI ⊃ 機械学習",
      "AI và 機械学習 là cùng một khái niệm"
    ],
    correct:1,
    why:"Theo Yasashii: AI (rộng nhất, tái hiện hành vi trí tuệ) ⊃ 機械学習 (kỹ thuật tái hiện 学習能力, là một loại AI) ⊃ ディープラーニング (loại machine learning đặc biệt dùng nhiều tầng ニューラルネットワーク). Ngắn gọn: 「ディープラーニングはニューラルネットワークを何重にも重ねた機械学習」.",
    whyWrong:{
      0:"Sai — 4 khái niệm có quan hệ bao hàm rõ ràng.",
      2:"Sai — đảo ngược thứ tự bao hàm.",
      3:"Sai — AI rộng hơn machine learning; có những loại AI không dựa trên học máy (vd: hệ chuyên gia)."
    },
    topic:"FE Syllabus — 基礎理論 / AI / 機械学習 / ディープラーニング"
  },
  {
    id:3, diff:"easy",
    q:"**機械学習 (machine learning)** là gì?",
    ja:"機械学習の説明として正しいものはどれか。",
    options:[
      "Kỹ thuật chế tạo robot cơ khí",
      "Kỹ thuật tái hiện 「人間が持つ学習能力」 (khả năng học của con người) trên máy tính — cho máy tính dữ liệu học để máy có thể dự đoán hoặc ra quyết định trong tương lai",
      "Cách lập trình bằng cách ghi tay từng dòng lệnh",
      "Phương pháp lưu trữ dữ liệu trong CSDL quan hệ"
    ],
    correct:1,
    why:"Yasashii 02-05: 「機械学習とは、人間が持つ学習能力をコンピュータ上に再現する技術であり、AI（人工知能）技術の1つです。機械学習では、コンピュータに学習用のデータを与えることで、コンピュータ自身が将来予測や意思決定を行うことができます」.",
    whyWrong:{
      0:"Đó là robotics (ロボット工学), không phải machine learning.",
      2:"Đó là lập trình thủ công truyền thống, hoàn toàn ngược với machine learning.",
      3:"Đó là CSDL (RDB), không liên quan."
    },
    topic:"FE Syllabus — 基礎理論 / 機械学習"
  },
  {
    id:4, diff:"easy",
    q:"**ニューラルネットワーク (neural network)** trong AI mô phỏng cái gì?",
    ja:"ニューラルネットワークが模倣している人間の仕組みはどれか。",
    options:[
      "Hệ tiêu hoá",
      "Hệ tuần hoàn máu",
      "**Mạng nơ-ron của bộ não — cách các tín hiệu thần kinh trao đổi qua các neuron (神経回路が信号をやり取りする仕組み)**",
      "Hệ xương khớp"
    ],
    correct:2,
    why:"Yasashii: 「ニューラルネットワークは、人間の脳の中にある『神経回路が信号をやり取りする仕組み』（これを『ニューロン』という）を、コンピュータ上に再現する技術」.",
    whyWrong:{
      0:"Không liên quan đến AI.",
      1:"Không liên quan đến AI.",
      3:"Không liên quan đến AI."
    },
    topic:"FE Syllabus — 基礎理論 / ニューラルネットワーク"
  },
  {
    id:5, diff:"easy",
    q:"**ディープラーニング (deep learning / 深層学習)** được định nghĩa như thế nào?",
    ja:"ディープラーニングの定義として正しいものはどれか。",
    options:[
      "Là phương pháp đào dữ liệu (data mining) sử dụng SQL",
      "Là machine learning có cấu trúc 「ニューラルネットワークを何重にも重ねた」 — chồng nhiều tầng neural network với nhau",
      "Là kỹ thuật lưu trữ AI lâu dài",
      "Là phương pháp duy nhất để xây dựng hệ chuyên gia"
    ],
    correct:1,
    why:"Yasashii 02-05: 「ディープラーニングとは、ニューラルネットワークを何重にも重ねた構造を持つ機械学習」 — Deep learning là một loại machine learning sử dụng neural network nhiều tầng (multi-layer / deep).",
    whyWrong:{
      0:"Data mining và SQL không liên quan trực tiếp đến deep learning.",
      2:"Không liên quan đến \"lưu trữ\".",
      3:"Hệ chuyên gia (エキスパートシステム) là loại AI khác, dựa trên rule-base."
    },
    topic:"FE Syllabus — 基礎理論 / ディープラーニング / 深層学習"
  },
  {
    id:6, diff:"mid",
    q:"Trong **教師あり学習 (supervised learning)**, máy tính được cung cấp những loại dữ liệu nào?",
    ja:"教師あり学習で、コンピュータに与えられるデータは何か。",
    options:[
      "Chỉ dữ liệu đầu vào (入力データ), không có nhãn",
      "**Cặp dữ liệu đầu vào (入力データ) + dữ liệu đáp án đúng (正解データ)** — máy học cách ánh xạ từ input sang đáp án",
      "Chỉ dữ liệu phần thưởng (報酬), máy tự khám phá",
      "Dữ liệu được sinh ngẫu nhiên không có cấu trúc"
    ],
    correct:1,
    why:"Yasashii 02-05: 「教師あり学習とは、入力データと正解データをセットにしてコンピュータに与える手法」. Ví dụ phân loại email spam: input = nội dung email, 正解 = label \"spam\"/\"không spam\".",
    whyWrong:{
      0:"Đó là 教師なし学習 (unsupervised learning).",
      2:"Đó là 強化学習 (reinforcement learning).",
      3:"Sai — supervised learning yêu cầu dữ liệu CÓ NHÃN."
    },
    topic:"FE Syllabus — 基礎理論 / 機械学習 / 教師あり学習"
  },
  {
    id:7, diff:"mid",
    q:"**教師なし学習 (unsupervised learning)** có đặc trưng gì?",
    ja:"教師なし学習の特徴はどれか。",
    options:[

      "Chỉ áp dụng cho dữ liệu hình ảnh"

    correct:1,
    why:"Yasashii 02-05: 「教師なし学習とは、入力データのみをコンピュータに与える手法。正解データは与えません。この作業を無数に繰り返すことで、コンピュータが独自にグループ分けを行います」. Ứng dụng tiêu biểu: phân cụm khách hàng (クラスタリング).",

      0:"Đó là 教師あり学習.",
      2:"Đó là 強化学習.",

    topic:"FE Syllabus — 基礎理論 / 機械学習 / 教師なし学習"

    id:8, diff:"mid",

    options:[

      "Máy không học, chỉ tra cứu cơ sở dữ liệu",
      "**Máy thực hiện hành động trong môi trường; mỗi hành động cho **報酬 (phần thưởng)** dưới dạng phản hồi; máy điều chỉnh để **報酬が最大** (tối đa hóa phần thưởng)**",
      "Yêu cầu con người giám sát từng bước và sửa lỗi"

    correct:2,
    why:"Slide 1 第10回 - ví dụ học cờ vây: 「碁石を打つ場所を探し、打った場所に応じて報酬がフィードバックされる。その報酬が最大となるように学習をしていく」. Đặc trưng: không có nhãn trực tiếp, học qua trial-and-error với phản hồi reward.",

    options:[

// ===== State =====
let current = 0;
let answers = new Array(questions.length).fill(null);

const quizArea = document.getElementById('quiz-area');
const resultArea = document.getElementById('result-area');
const progressText = document.getElementById('progress-text');
const progressFill = document.getElementById('progress-fill');
const answeredCount = document.getElementById('answered-count');
const progressWrap = document.getElementById('progress-wrap');

function diffClass(d){return d==='easy'?'diff-easy':d==='mid'?'diff-mid':'diff-hard'}
function diffLabel(d){return d==='easy'?'[Dễ / 易]':d==='mid'?'[TB / 中]':'[Khó / 難]'}

function render(){
  if(current >= questions.length){renderResult(); return;}
  const q = questions[current];
  const a = answers[current];
  const locked = a !== null;

  const opts = q.options.map((opt, i) => {
    let cls = 'option';
    if(locked){
      cls += ' locked';
      if(i === q.correct) cls += ' correct';
      else if(i === a) cls += ' wrong';
    }
    return `<div class="${cls}" data-idx="${i}">
      <div class="key">${String.fromCharCode(65+i)}</div>
      <div class="body">${opt}</div>
    </div>`;
  }).join('');

  let expHtml = '';
  if(locked){
    const wrongList = Object.keys(q.whyWrong).map(k=>{
      return `<p><span class="label">${String.fromCharCode(65+(+k))}.</span> ${q.whyWrong[k]}</p>`;
    }).join('');
    expHtml = `
      <div class="explanation" id="exp">
        <h4>💡 Giải thích</h4>
        <p><span class="label">Đáp án đúng:</span> ${String.fromCharCode(65+q.correct)}</p>
        <p><span class="label">Vì sao đúng:</span> ${q.why.replace(/\n/g,'<br>')}</p>
        <p><span class="label">Vì sao các phương án còn lại sai:</span></p>
        ${wrongList}
        <div class="topic">📚 <strong>Liên hệ FE:</strong> ${q.topic}</div>
      </div>`;
  }

  quizArea.innerHTML = `
    <div class="card">
      <span class="difficulty ${diffClass(q.diff)}">${diffLabel(q.diff)}</span>
      <p class="question"><strong>Câu ${q.id}.</strong> ${q.q.replace(/\n/g,'<br>')}
        <span class="ja">${q.ja}</span></p>
      <div class="options">${opts}</div>
      ${expHtml}
      <div class="actions">
        <button class="secondary" id="prev-btn" ${current===0?'disabled':''}>← Câu trước</button>
        ${locked ? `<button id="toggle-exp" class="amber">Xem / Ẩn giải thích</button>` : ''}
        <button id="next-btn" ${!locked?'disabled':''}>${current===questions.length-1?'Kết thúc & Xem kết quả':'Câu tiếp →'}</button>
      </div>
    </div>
  `;

  if(!locked){
    quizArea.querySelectorAll('.option').forEach(el=>{
      el.addEventListener('click', ()=>{
        const idx = +el.dataset.idx;
        answers[current] = idx;
        render();
        updateProgress();
      });
    });
  }

  document.getElementById('prev-btn').addEventListener('click', ()=>{if(current>0){current--; render(); updateProgress();}});
  document.getElementById('next-btn').addEventListener('click', ()=>{current++; render(); updateProgress();});
  const tex = document.getElementById('toggle-exp');
  if(tex){
    const expDiv = document.getElementById('exp');
    expDiv.classList.add('show');
    tex.addEventListener('click', ()=>{ expDiv.classList.toggle('show'); });
  }
}

function updateProgress(){
  if(current >= questions.length){
    progressWrap.style.display = 'none';
    return;
  }
  progressText.textContent = `Câu ${current+1} / ${questions.length}`;
  const answered = answers.filter(a=>a!==null).length;
  answeredCount.textContent = `Đã trả lời: ${answered}`;
  progressFill.style.width = ((current+1)/questions.length*100)+'%';
}

function renderResult(){
  quizArea.style.display='none';
  resultArea.style.display='block';
  progressWrap.style.display='none';

  const totals = {easy:{c:0,t:0}, mid:{c:0,t:0}, hard:{c:0,t:0}};
  let score = 0;
  questions.forEach((q,i)=>{
    totals[q.diff].t++;
    if(answers[i]===q.correct){score++; totals[q.diff].c++;}
  });
  const pct = Math.round(score/questions.length*100);
  let verdict, vClass;
  if(pct >= 80){verdict='🌟 Xuất sắc! Em đã nắm chắc AI + 確率/期待値 — sẵn sàng cho 科目A!'; vClass='v-excellent'}
  else if(pct >= 60){verdict='👍 Khá tốt! Cần ôn lại một số điểm chi tiết, đặc biệt phần 期待値 và bài tập tính toán.'; vClass='v-good'}
  else{verdict='💪 Cần cố gắng thêm! Hãy ôn lại Yasashii 02-05 + 20-03 và Slide 1 第10回 rồi làm lại.'; vClass='v-needs-work'}

  resultArea.innerHTML = `
    <div class="card result">
      <h2>🎉 Hoàn thành bài kiểm tra!</h2>
      <div class="score-big">${score} / ${questions.length}</div>
      <div class="score-pct">Đạt ${pct}%</div>
      <div class="verdict ${vClass}">${verdict}</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="lbl">🟢 Dễ / 易</div>
          <div class="val">${totals.easy.c} / ${totals.easy.t}</div>
        </div>
        <div class="breakdown-item">
          <div class="lbl">🟡 TB / 中</div>
          <div class="val">${totals.mid.c} / ${totals.mid.t}</div>
        </div>
        <div class="breakdown-item">
          <div class="lbl">🔴 Khó / 難</div>
          <div class="val">${totals.hard.c} / ${totals.hard.t}</div>
        </div>
      </div>
      <button id="restart-btn">🔁 Làm lại từ đầu</button>
      <button class="secondary" id="review-btn">📖 Xem lại bài</button>
    </div>
  `;
  document.getElementById('restart-btn').addEventListener('click', ()=>{
    current=0; answers=new Array(questions.length).fill(null);
    quizArea.style.display='block'; resultArea.style.display='none'; progressWrap.style.display='block';
    render(); updateProgress();
  });
  document.getElementById('review-btn').addEventListener('click', ()=>{
    current=0;
    quizArea.style.display='block'; resultArea.style.display='none'; progressWrap.style.display='block';
    render(); updateProgress();
  });
}

render();
updateProgress();
</script>
</body>
</html>
