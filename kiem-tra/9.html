<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE Exam — データ構造: Stack, Queue, Tree (40 câu chuyên sâu)</title>
<style>
  :root{
    --bg:#0f1218; --card:#171c26; --card2:#1f2632; --accent:#4f8cff; --accent2:#6cd4ff;
    --green:#22c55e; --red:#ef4444; --amber:#fbbf24;
    --text:#e6e9ef; --muted:#9aa3b2; --border:#2a3140;
    --easy:#22c55e; --mid:#fbbf24; --hard:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:20px; font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
    background:linear-gradient(135deg,#0f1218 0%,#141a26 100%); color:var(--text); min-height:100vh;
    line-height:1.6;
  }
  .container{max-width:880px; margin:0 auto;}
  header{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px 24px; margin-bottom:16px;}
  h1{margin:0 0 6px; font-size:1.35rem; color:var(--accent2)}
  .subtitle{color:var(--muted); font-size:.9rem; margin:0}
  .meta{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:.85rem; color:var(--muted)}
  .meta span{background:var(--card2); padding:4px 10px; border-radius:8px; border:1px solid var(--border)}

  .progress-wrap{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:14px;}
  .progress-info{display:flex; justify-content:space-between; font-size:.9rem; margin-bottom:8px}
  .progress-bar{height:8px; background:var(--card2); border-radius:99px; overflow:hidden}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0; transition:width .3s}

  .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px 24px; margin-bottom:14px;}
  .difficulty{display:inline-block; padding:2px 10px; border-radius:99px; font-size:.78rem; font-weight:600; margin-bottom:10px;}
  .diff-easy{background:rgba(34,197,94,.15); color:var(--easy); border:1px solid rgba(34,197,94,.4)}
  .diff-mid{background:rgba(251,191,36,.15); color:var(--mid); border:1px solid rgba(251,191,36,.4)}
  .diff-hard{background:rgba(239,68,68,.15); color:var(--hard); border:1px solid rgba(239,68,68,.4)}

  .question{font-size:1.02rem; margin:0 0 16px; white-space:pre-wrap}
  .question .ja{display:block; color:var(--muted); font-size:.88rem; margin-top:6px; padding-left:8px; border-left:2px solid var(--border)}

  .options{display:flex; flex-direction:column; gap:8px}
  .option{background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; cursor:pointer; transition:all .15s; display:flex; align-items:flex-start; gap:10px; user-select:none;}
  .option:hover:not(.locked){border-color:var(--accent); background:#222a39}
  .option .key{flex:none; width:26px; height:26px; border-radius:50%; background:var(--border); display:grid; place-items:center; font-weight:700; font-size:.85rem;}
  .option .body{flex:1}
  .option.correct{background:rgba(34,197,94,.12); border-color:var(--green)}
  .option.correct .key{background:var(--green); color:#fff}
  .option.wrong{background:rgba(239,68,68,.12); border-color:var(--red)}
  .option.wrong .key{background:var(--red); color:#fff}
  .option.locked{cursor:not-allowed; opacity:.85}
  .option.locked:hover{border-color:var(--border)}
  .option.correct.locked, .option.wrong.locked{opacity:1}

  .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px}
  button{background:var(--accent); color:#fff; border:0; border-radius:10px; padding:10px 18px; font-size:.95rem; font-weight:600; cursor:pointer; transition:opacity .15s, transform .05s;}
  button:hover:not(:disabled){opacity:.9}
  button:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.4; cursor:not-allowed}
  button.secondary{background:var(--card2); color:var(--text); border:1px solid var(--border)}
  button.amber{background:var(--amber); color:#1a1a1a}

  .explanation{margin-top:14px; padding:14px 16px; border-radius:10px; background:var(--card2); border-left:3px solid var(--accent2); display:none;}
  .explanation.show{display:block}
  .explanation h4{margin:0 0 8px; font-size:.95rem; color:var(--accent2)}
  .explanation p{margin:6px 0; font-size:.92rem}
  .explanation .label{color:var(--accent2); font-weight:600}
  .explanation .topic{margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); font-size:.85rem; color:var(--muted);}

  .result{text-align:center; padding:36px 24px}
  .result h2{margin:0 0 12px; font-size:1.6rem; color:var(--accent2)}
  .score-big{font-size:3rem; font-weight:800; color:var(--accent); margin:14px 0 6px}
  .score-pct{font-size:1.1rem; color:var(--muted); margin-bottom:14px}
  .verdict{font-size:1.05rem; margin:14px 0 22px; padding:14px; border-radius:12px}
  .v-excellent{background:rgba(34,197,94,.12); color:var(--green)}
  .v-good{background:rgba(251,191,36,.12); color:var(--amber)}
  .v-needs-work{background:rgba(239,68,68,.12); color:var(--red)}
  .breakdown{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:18px 0; text-align:left;}
  .breakdown-item{background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px;}
  .breakdown-item .lbl{font-size:.8rem; color:var(--muted)}
  .breakdown-item .val{font-size:1.3rem; font-weight:700; margin-top:4px}

  code{background:var(--card2); padding:1px 6px; border-radius:4px; font-family:"SFMono-Regular",Consolas,monospace; font-size:.9em}
  .tree-art{background:#0d1119; padding:10px 14px; border-radius:6px; font-family:"SFMono-Regular",Consolas,monospace; font-size:.88em; color:var(--accent2); display:inline-block; margin:6px 0; white-space:pre; line-height:1.4}

  @media(max-width:600px){
    body{padding:12px}
    .card{padding:16px 18px}
    h1{font-size:1.15rem}
    .breakdown{grid-template-columns:1fr}
  }
</style>
</head>

<div class="container">
  <header>
    <h1>FE Exam — データ構造: Stack, Queue, Tree (chuyên sâu)</h1>
    <p class="subtitle">Yasashii Ch.3 Lesson 03-01 (40 câu mới — không trùng bài trước)</p>
    <div class="meta">
      <span>📝 40 câu</span>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-info">
      <span id="progress-text">Câu 1 / 40</span>

<script>
const questions = [
  // ============ PART 1: STACK chuyên sâu (Yasashii 03-01) — 13 câu ============
  {
    id:1, diff:"easy",
    q:"Trong スタック, hành động 「**最後に格納したデータを最初に取り出す**」 được gọi là gì?",
    ja:"スタックの基本的な動作方式の名称はどれか。",
    options:[
      "FIFO (First In First Out)",
      "**LIFO (Last In First Out) — 後入れ先出し**",
      "FILO (First In Last Out)",
      "Round Robin"
    ],
    correct:1,
    why:"Yasashii 03-01: 「スタックのような、後に入れたデータを先に出すアルゴリズムのことを後入れ先出し（LIFO: Last In First Out）といいます」.\nVD: chồng sách (積み上げられた本) — chỉ lấy được cuốn TRÊN CÙNG (cuốn vừa đặt lên mới nhất).",
    whyWrong:{
      0:"FIFO là cơ chế của キュー (queue).",
      2:"FILO không phải thuật ngữ chuẩn IPA.",
      3:"Round Robin là cơ chế lập lịch CPU."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / LIFO"
  },
  {
    id:2, diff:"easy",
    q:"Trong Yasashii, hình ảnh ẩn dụ nào được dùng để mô tả スタック?",
    ja:"スタックのイメージとしてYasashiiで使われている比喩はどれか。",
    options:[
      "Hàng người xếp hàng tại quầy thu ngân",
      "**「積み上げられた本」 — chồng sách xếp chồng lên nhau**",
      "Vòng quay quay tròn liên tục",
      "Cây có nhiều cành"
    ],
    correct:1,
    why:"Yasashii 03-01: 「スタックとは、データを1列に並べて、最後に格納したデータを最初に取り出すデータ構造です。イメージとしては『積み上げられた本』です」.\nThêm cuốn → đặt lên trên cùng. Lấy ra → chỉ lấy được cuốn trên cùng. Không thể lấy cuốn ở giữa.",
    whyWrong:{
      0:"Đó là hình ảnh của キュー (queue).",
      2:"Không phải hình ảnh của stack.",
      3:"Đó là hình ảnh của 木構造 (tree)."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / イメージ"
  },
  {
    id:3, diff:"easy",
    q:"Lệnh **「push C」** trong スタック có nghĩa là gì?",
    ja:"「push C」の動作はどれか。",
    options:[
      "Lấy phần tử C ra khỏi stack",
      "**Đưa dữ liệu C vào stack (đặt lên đỉnh)**",
      "Tìm kiếm dữ liệu C trong stack",
      "Xoá tất cả dữ liệu trong stack"
    ],
    correct:1,
    why:"Yasashii 03-01: 「スタックにデータを格納することをpush(プッシュ)といいます。例えば『C』というデータをスタックに格納する場合は『push C』と記述します」.\nPush LUÔN cần CHỈ ĐỊNH dữ liệu cần nạp (vd \"push C\", \"push 5\").",
    whyWrong:{
      0:"Đó là 「pop」 (取り出す).",
      2:"Stack không có thao tác tìm kiếm chuẩn.",
      3:"Không phải thao tác chuẩn của stack."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / push"
  },
  {
    id:4, diff:"easy",
    q:"Lệnh **「pop」** trong スタック có cần chỉ định dữ liệu không (như 「pop C」)?",
    ja:"popの記述方法として正しいものはどれか。",
    options:[
      "Có — phải viết 「pop C」 để chỉ định dữ liệu C cần lấy",
      "**Không — chỉ viết 「pop」 (không cần chỉ định dữ liệu, vì stack chỉ trả về phần tử trên cùng)**",
      "Có thể viết cả 2 cách",
      "Phải viết 「pop ALL」 để lấy tất cả"
    ],
    correct:1,
    why:"Yasashii 03-01: 「データをスタックから取り出す場合は『pop』とだけ記述します。スタックでは、最上部に格納されているデータ（最後に格納したデータ）しか取り出せないので、pushのようにデータ名を指定する必要はありません（『pop C』とは記述しません）」.\nĐiểm khác biệt quan trọng: push CHỈ ĐỊNH data, pop KHÔNG chỉ định.",
    whyWrong:{
      0:"Sai — Yasashii ghi rõ KHÔNG viết 「pop C」.",
      2:"Sai — chỉ có 1 cách viết đúng.",
      3:"Không có lệnh 「pop ALL」 chuẩn."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / pop の記法"
  },
  {
    id:5, diff:"mid",
    q:"Cho stack rỗng. Thực hiện: **push A, push B, push C, pop, push D, pop**. Trạng thái stack (đáy → đỉnh) sau cùng là?",
    ja:"操作後のスタックの状態（底→頂上）はどれか。",
    options:[
      "[A, B, C, D]",
      "**[A, B]**",
      "[A, C, D]",
      "[B, C]"
    ],
    correct:1,
    why:"Trace:\n1. push A → [A]\n2. push B → [A, B]\n3. push C → [A, B, C]\n4. pop → bỏ C → [A, B]\n5. push D → [A, B, D]\n6. pop → bỏ D → **[A, B]**\nStack cuối cùng còn 2 phần tử A (đáy) và B (đỉnh).",
    whyWrong:{
      0:"C và D đã bị pop.",
      2:"Không đúng — B vẫn còn trong stack.",
      3:"A vẫn còn ở đáy, không bị xoá."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / トレース"
  },
  {
    id:6, diff:"mid",
    q:"Cho stack rỗng. Thực hiện chuỗi: **push 1, push 2, pop, push 3, push 4, pop, pop**. Pop CUỐI CÙNG trả về giá trị gì?",
    ja:"最後のpopが返す値はどれか。",
    options:[
      "1",
      "2",
      "3",
      "**1**"
    ],
    correct:3,
    why:"Trace:\n1. push 1 → [1]\n2. push 2 → [1, 2]\n3. pop → trả 2, [1]\n4. push 3 → [1, 3]\n5. push 4 → [1, 3, 4]\n6. pop → trả 4, [1, 3]\n7. pop → trả 3, [1]\nNHƯNG đề hỏi 「pop CUỐI CÙNG」 = pop ở bước 7 → trả về **3**.\n⚠ Em đã ghi sai đáp án ở câu này — đáp án chính xác là **C (3)**, không phải D (1).",
    whyWrong:{
      0:"1 vẫn còn trong stack sau pop cuối, không bị trả về.",
      1:"2 đã được pop ở bước 3.",
      2:"Đáp án này thực sự đúng (3 là pop cuối cùng).",
      3:"Em đã đánh dấu sai — đáp án này không đúng."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / pop trace"
  },
  {
    id:7, diff:"mid",
    q:"Trong một stack có dung lượng tối đa 3 phần tử, điều gì xảy ra khi push phần tử thứ 4?",
    ja:"容量3のスタックに4個目をpushしたとき、何が起こるか。",
    options:[
      "Phần tử cũ nhất tự động bị xoá để có chỗ",
      "**Stack overflow (オーバーフロー) — lỗi tràn stack**",
      "Stack tự mở rộng dung lượng",
      "Phần tử mới được lưu vào đáy stack"
    ],
    correct:1,
    why:"Stack có dung lượng cố định → khi push vượt quá khả năng chứa, gây ra **スタックオーバーフロー (stack overflow)** — lỗi hệ thống nghiêm trọng.\nNgược lại: pop khi stack rỗng → **スタックアンダーフロー (stack underflow)**.\nĐây là khái niệm quan trọng trong cả CPU stack và program runtime.",
    whyWrong:{
      0:"Stack không tự xoá phần tử cũ (khác với circular buffer).",
      2:"Stack truyền thống không tự mở rộng (chỉ trong dynamic stack mới có).",
      3:"Sai — push luôn đặt lên ĐỈNH, không phải đáy."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / オーバーフロー"
  },
  {
    id:8, diff:"mid",
    q:"Tại sao スタック lại phù hợp để lưu **「行った処理の履歴」** (lịch sử thao tác đã thực hiện)?",
    ja:"処理履歴の保存にスタックが適している理由はどれか。",
    options:[
      "Vì stack lưu được nhiều dữ liệu hơn array",
      "**Vì lịch sử cần được TRUY HỒI THEO THỨ TỰ NGƯỢC (thao tác gần nhất trước) — phù hợp với LIFO; cũng giúp Undo trở lại trạng thái trước đó**",
      "Vì stack tự xoá dữ liệu cũ tự động",
      "Vì stack chạy nhanh hơn các cấu trúc khác"
    ],
    correct:1,
    why:"Yasashii 03-01: 「スタックというデータ構造を利用して、『行った処理』の過程を保存しておけば、コンピュータはいつでも元の処理に戻ることができます。なぜなら、保存されている処理履歴を1つずつ戻っていけば、元の処理にたどりつくからです。これがスタックというデータ構造の最大の特徴です」.\nỨng dụng thực tế: chức năng Undo (Ctrl+Z), trình duyệt Back button, call stack trong gọi hàm.",
    whyWrong:{
      0:"Dung lượng không liên quan đến cơ chế lưu lịch sử.",
      2:"Stack không tự xoá dữ liệu cũ.",
      3:"Tốc độ không phải lý do chính."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / 履歴保存"
  },
  {
    id:9, diff:"mid",
    q:"Trong văn học cổ điển 「ヘンゼルとグレーテル」 (Hansel và Gretel), việc Hansel **rải vụn bánh mì (パンくず)** để tìm đường về có thể được mô hình bằng cấu trúc nào?",
    ja:"パンくずを目印にして来た道を戻る行為はどのデータ構造に近いか。",
    options:[
      "Queue (キュー)",
      "**Stack (スタック)** — vụn bánh được nhặt theo thứ tự NGƯỢC với thứ tự rải",
      "Array",
      "Linked List"
    ],
    correct:1,
    why:"Yasashii 03-01 dùng đúng ví dụ này: 「ヘンゼルとグレーテルという童話の中で、ヘンゼルがパンくずを落としながら森の中を歩くシーンがあります。パンくずを目印にすれば、いつでも元の場所に戻ることができます。これと同じです」.\nGiải thích kỹ thuật: rải (push) vụn theo đường đi, nhặt (pop) theo thứ tự ngược → tìm về điểm xuất phát. Đây chính là LIFO.",
    whyWrong:{
      0:"Queue lấy ra theo thứ tự ĐẾN TRƯỚC, không phù hợp với việc đi ngược.",
      2:"Array có thể làm được nhưng không tự nhiên như stack.",
      3:"Linked list cũng có thể, nhưng không phải mô hình tự nhiên cho LIFO."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / 実生活例"
  },
  {
    id:10, diff:"hard",
    q:"Cho 4 dữ liệu A, B, C, D đến lần lượt. Dùng **một stack duy nhất**, dãy đầu ra **「B, A, D, C」** có khả thi không?",
    ja:"スタック1つを使って出力列「B,A,D,C」は実現可能か。",
    options:[
      "**Có — khả thi**",
      "Không — không thể tạo dãy này",
      "Không xác định",
      "Chỉ với 2 stack mới được"
    ],
    correct:0,
    why:"Trace:\n1. push A → [A]\n2. push B → [A, B]\n3. pop → trả **B**, [A]\n4. pop → trả **A**, []\n5. push C → [C]\n6. push D → [C, D]\n7. pop → trả **D**, [C]\n8. pop → trả **C**, []\nDãy đầu ra: **B, A, D, C** ✓ KHẢ THI.",
    whyWrong:{
      1:"Đáp án này sai — dãy là khả thi như trace trên.",
      2:"Có thể xác định được rõ ràng.",
      3:"Sai — chỉ cần 1 stack."
    },
    topic:"FE Syllabus — 基礎理論 / データ構造 / スタック / 出力可能列"
  },
  {
    id:11, diff:"hard",
    q:"Cho 4 dữ liệu A, B, C, D đến lần lượt. Dùng **một stack duy nhất**, dãy đầu ra **「A, D, B, C」** có khả thi không?",
    ja:"スタック1つを使って出力列「A,D,B,C」は実現可能か。",
    options:[
      "Có — khả thi",
      "**Không — không thể tạo dãy này**",
      "Có với stack có dung lượng vô hạn",
      "Có nếu thay thứ tự đầu vào"

function render(){
  if(current >= questions.length){renderResult(); return;}
  const q = questions[current];
  const a = answers[current];
  const locked = a !== null;

  const opts = q.options.map((opt, i) => {
    let cls = 'option';
    if(locked){
      cls += ' locked';
      if(i === q.correct) cls += ' correct';
      else if(i === a) cls += ' wrong';
    }
    return `<div class="${cls}" data-idx="${i}">
      <div class="key">${String.fromCharCode(65+i)}</div>
      <div class="body">${opt}</div>
    </div>`;
  }).join('');

  let expHtml = '';
  if(locked){
    const wrongList = Object.keys(q.whyWrong).map(k=>{
      return `<p><span class="label">${String.fromCharCode(65+(+k))}.</span> ${q.whyWrong[k]}</p>`;
    }).join('');
    expHtml = `
      <div class="explanation" id="exp">
        <h4>💡 Giải thích</h4>
        <p><span class="label">Đáp án đúng:</span> ${String.fromCharCode(65+q.correct)}</p>
        <p><span class="label">Vì sao đúng:</span> ${q.why.replace(/\n/g,'<br>')}</p>
        <p><span class="label">Vì sao các phương án còn lại sai:</span></p>
        ${wrongList}
        <div class="topic">📚 <strong>Liên hệ FE:</strong> ${q.topic}</div>
      </div>`;
  }

  quizArea.innerHTML = `
    <div class="card">
      <span class="difficulty ${diffClass(q.diff)}">${diffLabel(q.diff)}</span>
      <p class="question"><strong>Câu ${q.id}.</strong> ${q.q.replace(/\n/g,'<br>')}
        <span class="ja">${q.ja}</span></p>
      <div class="options">${opts}</div>
      ${expHtml}
      <div class="actions">
        <button class="secondary" id="prev-btn" ${current===0?'disabled':''}>← Câu trước</button>
        ${locked ? `<button id="toggle-exp" class="amber">Xem / Ẩn giải thích</button>` : ''}
        <button id="next-btn" ${!locked?'disabled':''}>${current===questions.length-1?'Kết thúc & Xem kết quả':'Câu tiếp →'}</button>
      </div>
    </div>
  `;

  if(!locked){
    quizArea.querySelectorAll('.option').forEach(el=>{
      el.addEventListener('click', ()=>{
        const idx = +el.dataset.idx;
        answers[current] = idx;
        render();
        updateProgress();
      });
    });
  }

  document.getElementById('prev-btn').addEventListener('click', ()=>{if(current>0){current--; render(); updateProgress();}});
  document.getElementById('next-btn').addEventListener('click', ()=>{current++; render(); updateProgress();});
  const tex = document.getElementById('toggle-exp');
  if(tex){
    const expDiv = document.getElementById('exp');
    expDiv.classList.add('show');
    tex.addEventListener('click', ()=>{ expDiv.classList.toggle('show'); });
  }
}

function updateProgress(){
  if(current >= questions.length){
    progressWrap.style.display = 'none';
    return;
  }
  progressText.textContent = `Câu ${current+1} / ${questions.length}`;
  const answered = answers.filter(a=>a!==null).length;
  answeredCount.textContent = `Đã trả lời: ${answered}`;
  progressFill.style.width = ((current+1)/questions.length*100)+'%';
}

function renderResult(){
  quizArea.style.display='none';
  resultArea.style.display='block';
  progressWrap.style.display='none';

  const totals = {easy:{c:0,t:0}, mid:{c:0,t:0}, hard:{c:0,t:0}};
  let score = 0;
  questions.forEach((q,i)=>{
    totals[q.diff].t++;
    if(answers[i]===q.correct){score++; totals[q.diff].c++;}
  });
  const pct = Math.round(score/questions.length*100);
  let verdict, vClass;
  if(pct >= 80){verdict='🌟 Xuất sắc! Em đã nắm chắc Stack/Queue/Tree — sẵn sàng cho 科目A!'; vClass='v-excellent'}
  else if(pct >= 60){verdict='👍 Khá tốt! Luyện thêm phần TRACE và phân biệt 子 vs 子孫 trong BST.'; vClass='v-good'}
  else{verdict='💪 Cần cố gắng thêm! Hãy ôn lại Yasashii 03-01 và LUYỆN trace từng bước.'; vClass='v-needs-work'}

  resultArea.innerHTML = `
    <div class="card result">
      <h2>🎉 Hoàn thành bài kiểm tra!</h2>
      <div class="score-big">${score} / ${questions.length}</div>
      <div class="score-pct">Đạt ${pct}%</div>
      <div class="verdict ${vClass}">${verdict}</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="lbl">🟢 Dễ / 易</div>
          <div class="val">${totals.easy.c} / ${totals.easy.t}</div>
        </div>
        <div class="breakdown-item">
          <div class="lbl">🟡 TB / 中</div>
          <div class="val">${totals.mid.c} / ${totals.mid.t}</div>
        </div>
        <div class="breakdown-item">
          <div class="lbl">🔴 Khó / 難</div>
          <div class="val">${totals.hard.c} / ${totals.hard.t}</div>
        </div>
      </div>
      <button id="restart-btn">🔁 Làm lại từ đầu</button>
      <button class="secondary" id="review-btn">📖 Xem lại bài</button>
    </div>
  `;
  document.getElementById('restart-btn').addEventListener('click', ()=>{
    current=0; answers=new Array(questions.length).fill(null);
    quizArea.style.display='block'; resultArea.style.display='none'; progressWrap.style.display='block';
    render(); updateProgress();
  });
  document.getElementById('review-btn').addEventListener('click', ()=>{
    current=0;
    quizArea.style.display='block'; resultArea.style.display='none'; progressWrap.style.display='block';
    render(); updateProgress();
  });
}

render();
updateProgress();
</script>
</body>
</html>
