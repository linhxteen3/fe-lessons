<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE 学習 — Tài liệu học</title>
<style>
:root {
  --bg: #F7F8FC;
  --surface: #FFFFFF;
  --surface2: #F0F2FA;
  --border: #E4E6F0;
  --ink: #111827;
  --ink2: #6B7280;
  --ink3: #9CA3AF;
  --primary: #4F46E5;
  --primary-light: #EEF2FF;
  --primary-mid: #C7D2FE;

  --p0-ink: #9CA3AF; --p0-bg: #F3F4F6; --p0-border: #E5E7EB;
  --p1-ink: #3B82F6; --p1-bg: #EFF6FF; --p1-border: #BFDBFE;
  --p2-ink: #F59E0B; --p2-bg: #FFFBEB; --p2-border: #FDE68A;
  --p3-ink: #8B5CF6; --p3-bg: #F5F3FF; --p3-border: #DDD6FE;
  --p4-ink: #10B981; --p4-bg: #ECFDF5; --p4-border: #A7F3D0;

  --mono: ui-monospace, "SF Mono", "IBM Plex Mono", Menlo, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
}

* { box-sizing: border-box; margin: 0; padding: 0 }
html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.55; -webkit-font-smoothing: antialiased }
a { color: inherit }

.wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px 100px }

/* ── HEADER ── */
.hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; margin-bottom: 20px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap }
.hero-left {}
.eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--primary); font-weight: 600; margin-bottom: 6px }
.hero-title { font-size: 26px; font-weight: 700; letter-spacing: -.02em; line-height: 1.2 }
.hero-title .soft { color: var(--ink2); font-weight: 400 }
.hero-right { display: flex; flex-direction: column; align-items: flex-end; gap: 14px; min-width: 180px }

.prog-big   { font-family: var(--mono); font-size: 22px; font-weight: 700; line-height: 1 }
.prog-small { font-size: 12px; color: var(--ink2); margin-top: 2px }

/* phase chips summary */
.phase-sum { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end }
.ps-chip { display: flex; align-items: center; gap: 5px; font-size: 11.5px; font-family: var(--mono); font-weight: 600; padding: 4px 10px; border-radius: 99px; border: 1px solid }
.ps-chip.p4 { color: var(--p4-ink); background: var(--p4-bg); border-color: var(--p4-border) }
.ps-chip.p3 { color: var(--p3-ink); background: var(--p3-bg); border-color: var(--p3-border) }
.ps-chip.p2 { color: var(--p2-ink); background: var(--p2-bg); border-color: var(--p2-border) }
.ps-chip.p1 { color: var(--p1-ink); background: var(--p1-bg); border-color: var(--p1-border) }
.ps-chip.p0 { color: var(--p0-ink); background: var(--p0-bg); border-color: var(--p0-border) }
.ps-chip .dot { width: 6px; height: 6px; border-radius: 99px; background: currentColor }

/* ── BANNER ── */
.banner { display: none; gap: 10px; align-items: flex-start; background: var(--primary-light); border: 1px solid var(--primary-mid); color: #3730A3; padding: 12px 16px; border-radius: 10px; font-size: 13.5px; margin-bottom: 18px }
.banner.show { display: flex }

/* ── CONTROLS ── */
.controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px }
.search { flex: 1; min-width: 220px; position: relative }
.search input { width: 100%; padding: 10px 14px 10px 38px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); font: inherit; font-size: 14px; color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.04) }
.search input::placeholder { color: var(--ink3) }
.search input:focus { outline: 2px solid var(--primary); outline-offset: 1px; border-color: transparent }
.search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--ink3) }
.chips { display: flex; gap: 6px; flex-wrap: wrap }
.chip { font: inherit; font-size: 13px; padding: 7px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--ink2); cursor: pointer; font-weight: 500; transition: all .15s }
.chip:hover { border-color: var(--primary); color: var(--primary) }
.chip[aria-pressed="true"] { background: var(--primary); color: #fff; border-color: var(--primary) }

/* ── LESSON LIST ── */
.spine { list-style: none; display: flex; flex-direction: column; gap: 8px }

.row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: grid; grid-template-columns: 48px 1fr auto; gap: 16px; align-items: center; transition: box-shadow .15s, border-color .15s }
.row:hover { box-shadow: var(--shadow); border-color: var(--primary-mid) }

.stt { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--primary); text-align: right; font-variant-numeric: tabular-nums; opacity: .7 }

.meta { min-width: 0 }
.topic { font-weight: 600; font-size: 15px; word-break: break-word; line-height: 1.4 }
.row-foot { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap }

/* phase badge */
.badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; letter-spacing: .03em; padding: 4px 10px; border-radius: 99px; font-weight: 700; border: 1px solid; flex-shrink: 0 }
.badge.p0 { color: var(--p0-ink); background: var(--p0-bg); border-color: var(--p0-border) }
.badge.p1 { color: var(--p1-ink); background: var(--p1-bg); border-color: var(--p1-border) }
.badge.p2 { color: var(--p2-ink); background: var(--p2-bg); border-color: var(--p2-border) }
.badge.p3 { color: var(--p3-ink); background: var(--p3-bg); border-color: var(--p3-border) }
.badge.p4 { color: var(--p4-ink); background: var(--p4-bg); border-color: var(--p4-border) }
.badge .dot { width: 6px; height: 6px; border-radius: 99px; background: currentColor }

.toggle-btn { font: inherit; font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 99px; cursor: pointer; border: 1px solid; transition: all .12s }
.toggle-btn.p0 { background: var(--p4-bg); color: var(--p4-ink); border-color: var(--p4-border) }
.toggle-btn.p0:hover { background: var(--p4-ink); color: #fff; border-color: var(--p4-ink) }
.toggle-btn.p4 { background: var(--p0-bg); color: var(--p0-ink); border-color: var(--p0-border) }
.toggle-btn.p4:hover { background: var(--p0-ink); color: #fff; border-color: var(--p0-ink) }

/* action buttons */
.actions { display: flex; gap: 8px; flex-shrink: 0 }
.btn { font: inherit; font-size: 13px; padding: 8px 14px; border-radius: 9px; border: 1px solid var(--primary-mid); background: var(--primary-light); color: var(--primary); cursor: pointer; white-space: nowrap; font-weight: 600; transition: all .12s }
.btn:hover { background: var(--primary); color: #fff; border-color: var(--primary) }
.btn[disabled] { border-color: var(--border); color: var(--ink3); background: var(--surface); cursor: not-allowed }

.empty { text-align: center; color: var(--ink2); padding: 56px 0; font-size: 15px }

/* ── READING PANE ── */
.pane { position: fixed; inset: 0; background: rgba(17,24,39,.45); display: none; z-index: 50; backdrop-filter: blur(2px) }
.pane.open { display: block }
.pane-inner { position: absolute; top: 0; right: 0; bottom: 0; width: min(880px,100%); background: var(--surface); display: flex; flex-direction: column; box-shadow: -16px 0 48px rgba(0,0,0,.14) }
.pane-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border) }
.pane-head .pstt { font-family: var(--mono); font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 3px 9px; border-radius: 6px; font-size: 13px }
.pane-head .ptopic { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 15px }
.pane-head a, .pane-head button { font: inherit; font-size: 13px; border: 1px solid var(--border); background: var(--surface); border-radius: 8px; padding: 7px 12px; cursor: pointer; color: var(--ink); text-decoration: none; font-weight: 500; transition: all .12s }
.pane-head a:hover, .pane-head button:hover { background: var(--surface2) }
.pane-head .close { font-size: 16px; line-height: 1; padding: 7px 11px }
.tabs { display: flex; gap: 2px; padding: 12px 20px 0; border-bottom: 1px solid var(--border) }
.tab { font: inherit; font-size: 13.5px; padding: 8px 16px; border: none; background: none; color: var(--ink2); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 500; margin-bottom: -1px; transition: color .12s }
.tab[aria-selected="true"] { color: var(--primary); border-bottom-color: var(--primary) }
iframe { flex: 1; width: 100%; border: 0; background: #fff }
.pane-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--ink2); padding: 40px; font-size: 14.5px; line-height: 1.7 }

/* ── TOAST ── */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(12px); background: #111827; color: #fff; padding: 10px 22px; border-radius: 99px; font-size: 13.5px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; z-index: 200; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.2) }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) }

@media (max-width: 640px) {
  .hero { padding: 20px }
  .row { grid-template-columns: 36px 1fr; gap: 12px }
  .actions { grid-column: 1 / -1; justify-content: flex-start }
  .hero-title { font-size: 21px }
  .prog-big { font-size: 18px }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HERO HEADER -->
  <div class="hero">
    <div class="hero-left">
      <div class="eyebrow">FE Syllabus · 学習トラッカー</div>
      <div class="hero-title">Tài liệu học FE <span class="soft">／ 教材</span></div>
    </div>
    <div class="hero-right">
      <div>
        <div class="prog-big" id="pnum">0 / 0</div>
        <div class="prog-small">bài đã xong</div>
      </div>
      <div class="phase-sum" id="phaseSum"></div>
    </div>
  </div>

  <div class="banner" id="banner">
    <span>ⓘ</span>
    <div><b>Đang xem bản mẫu.</b> Khi đưa <code>lessons.json</code> lên GitHub Pages, danh sách thật sẽ hiện và bài học mở ngay trong trang.</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Tìm theo chủ đề hoặc số thứ tự…" aria-label="Tìm bài học">
    </div>
    <div class="chips" role="group" aria-label="Lọc theo trạng thái">
      <button class="chip" data-f="all" aria-pressed="true">Tất cả</button>
      <button class="chip" data-f="p4"  aria-pressed="false">Đã xong</button>
      <button class="chip" data-f="p0"  aria-pressed="false">Chưa bắt đầu</button>
    </div>
  </div>

  <ol class="spine" id="list"></ol>
  <div class="empty" id="empty" style="display:none">Không có bài nào khớp.</div>
</div>

<!-- READING PANE -->
<div class="pane" id="pane" role="dialog" aria-modal="true" aria-label="Bài học">
  <div class="pane-inner">
    <div class="pane-head">
      <span class="pstt" id="pPstt"></span>
      <span class="ptopic" id="pTopic"></span>
      <a id="pNew" href="#" target="_blank" rel="noopener" title="Mở tab mới">↗ Tab mới</a>
      <button class="close" id="pClose" aria-label="Đóng">✕</button>
    </div>
    <div class="tabs">
      <button class="tab" id="tabTheory" aria-selected="true">Lý thuyết</button>
      <button class="tab" id="tabTest"   aria-selected="false">Kiểm tra 40 câu</button>
    </div>
    <iframe id="frame" title="Nội dung bài học"></iframe>
    <div class="pane-placeholder" id="placeholder" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PHASES = {
  p0: { label:"Chưa bắt đầu", short:"Chưa" },
  p4: { label:"Đã xong",      short:"Xong"  },
};
const PHASE_ORDER = ["p0","p4"];

const SAMPLE = {
  lessons:[
    {stt:1,  topic:"n進数の概念 · Khái niệm hệ cơ số n",   theory:"ly-thuyet/1.html",  test:"kiem-tra/1.html",  status:"p4"},
    {stt:2,  topic:"基数変換 · Chuyển đổi cơ số",          theory:"ly-thuyet/2.html",  test:"kiem-tra/2.html",  status:"p4"},
    {stt:6,  topic:"論理回路 · Mạch logic",                 theory:"ly-thuyet/6.html",  test:"kiem-tra/6.html",  status:"p4"},
    {stt:13, topic:"ソート · Sắp xếp",                     theory:"ly-thuyet/13.html", test:"kiem-tra/13.html", status:"p0"},
    {stt:14, topic:"OOP+UML + 過去問 Ch.3",                 theory:null, test:null, status:"p0"},
    {stt:15, topic:"5大装置・CPU基本",                      theory:null, test:null, status:"p0"},
  ]
};

let DATA = [], filter = "all", query = "", sampleMode = false, cur = null, curTab = "theory";
const $ = s => document.querySelector(s);

function migrate(s){
  if(s==="done"||s==="p4"||s==="p3"||s==="p2"||s==="p1") return "p4";
  return "p0";
}

async function load(){
  try{
    const r = await fetch("./lessons.json", {cache:"no-store"});
    if(!r.ok) throw 0;
    const j = await r.json();
    DATA = (j.lessons||[]).map(l=>({...l, status:migrate(l.status)}));
  }catch{
    DATA = SAMPLE.lessons.map(l=>({...l, status:migrate(l.status)}));
    sampleMode = true; $("#banner").classList.add("show");
  }
  DATA.sort((a,b)=>a.stt-b.stt);
  render(); updateProgress();
}

function updateProgress(){
  const tot = DATA.length;
  const cnt = {}; PHASE_ORDER.forEach(p=>cnt[p]=0);
  DATA.forEach(l=>cnt[l.status]=(cnt[l.status]||0)+1);
  const d4 = cnt.p4||0;
  const pct = tot ? Math.round(d4/tot*100) : 0;

  $("#pnum").textContent = d4 + " / " + tot;
  const sum = $("#phaseSum");
  sum.innerHTML = `
    <div class="ps-chip p4"><span class="dot"></span>${cnt.p4||0} Đã xong</div>
    <div class="ps-chip p0"><span class="dot"></span>${cnt.p0||0} Chưa bắt đầu</div>`;
}

function render(){
  const q = query.trim().toLowerCase();
  const rows = DATA.filter(l=>{
    if(filter!=="all" && l.status!==filter) return false;
    if(q && !((l.topic||"").toLowerCase().includes(q)||String(l.stt).includes(q))) return false;
    return true;
  });
  const list = $("#list"), empty = $("#empty");
  list.innerHTML = "";
  empty.style.display = rows.length ? "none" : "block";
  for(const l of rows){
    const idx = PHASE_ORDER.indexOf(l.status);
    const ph  = PHASES[l.status] || PHASES.p0;
    const li  = document.createElement("li");
    li.className = "row";
    li.innerHTML = `
      <div class="stt">${String(l.stt).padStart(2,"0")}</div>
      <div class="meta">
        <div class="topic"></div>
        <div class="row-foot">
          <span class="badge ${l.status}"><span class="dot"></span>${ph.label}</span>
          <button class="toggle-btn ${l.status}" data-stt="${l.stt}">${l.status==="p4"?"↩ Đánh dấu chưa xong":"✓ Đánh dấu đã xong"}</button>
        </div>
      </div>
      <div class="actions">
        <button class="btn" data-t="theory" ${l.theory?"":"disabled"}>Lý thuyết</button>
        <button class="btn" data-t="test"   ${l.test?"":"disabled"}>Kiểm tra</button>
      </div>`;
    li.querySelector(".topic").textContent = l.topic || "(chưa có chủ đề)";
    li.querySelectorAll("button[data-t]").forEach(b=>{ if(!b.disabled) b.onclick = ()=>openPane(l,b.dataset.t) });
    li.querySelector(".toggle-btn").onclick = ()=>toggleStatus(l);
    list.appendChild(li);
  }
}

function toggleStatus(l){
  l.status = l.status === "p4" ? "p0" : "p4";
  render(); updateProgress();
  showToast(`Bài ${String(l.stt).padStart(2,"0")} → ${PHASES[l.status].label}`);
}

let toastT;
function showToast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200);
}

function openPane(l, tab){
  cur=l; curTab=(tab==="test"&&l.test)?"test":(l.theory?"theory":"test");
  $("#pPstt").textContent=String(l.stt).padStart(2,"0");
  $("#pTopic").textContent=l.topic||"";
  $("#tabTheory").style.display=l.theory?"":"none";
  $("#tabTest").style.display=l.test?"":"none";
  $("#pane").classList.add("open");
  document.body.style.overflow="hidden";
  showTab(curTab);
}
function showTab(tab){
  curTab=tab;
  $("#tabTheory").setAttribute("aria-selected",tab==="theory");
  $("#tabTest").setAttribute("aria-selected",tab==="test");
  const src=tab==="theory"?cur.theory:cur.test;
  $("#pNew").href=src||"#";
  const frame=$("#frame"),ph=$("#placeholder");
  if(sampleMode){ frame.style.display="none"; ph.style.display="flex"; ph.textContent="Bản mẫu — nội dung bài sẽ hiển thị sau khi deploy lên GitHub Pages."; }
  else{ ph.style.display="none"; frame.style.display="block"; frame.src=src; }
}
function closePane(){
  $("#pane").classList.remove("open");
  document.body.style.overflow="";
  $("#frame").src="about:blank"; cur=null;
}

$("#tabTheory").onclick=()=>showTab("theory");
$("#tabTest").onclick=()=>showTab("test");
$("#pClose").onclick=closePane;
$("#pane").onclick=e=>{ if(e.target.id==="pane") closePane() };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closePane() });
$("#q").addEventListener("input",e=>{ query=e.target.value; render() });
document.querySelectorAll(".chip").forEach(c=>{
  c.onclick=()=>{
    filter=c.dataset.f;
    document.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed",x===c));
    render();
  };
});

load();
</script>
</body>
</html>
