<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE 学習 — Tài liệu học</title>
<style>
  :root{
    --paper:#FAFAFC; --ink:#16182B; --ink-soft:#5A5E78; --line:#E6E7EF;
    --surface:#FFFFFF; --primary:#2D3A8C; --primary-tint:#EEF0FB;
    --done:#0E8C6B; --doing:#C77D2E; --todo:#8A8FA8;
    --mono:ui-monospace,"SF Mono","IBM Plex Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:920px;margin:0 auto;padding:32px 20px 80px}

  /* header */
  header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:8px}
  .title{font-family:var(--mono);font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);font-weight:600}
  h1{margin:2px 0 0;font-size:28px;letter-spacing:-.01em}
  h1 .jp{color:var(--ink-soft);font-weight:500}
  .progress-box{text-align:right;min-width:180px}
  .progress-num{font-family:var(--mono);font-size:22px;font-weight:600}
  .progress-num span{color:var(--ink-soft);font-size:14px}
  .bar{height:6px;border-radius:99px;background:var(--line);margin-top:6px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--done);border-radius:99px;transition:width .5s ease}
  @media (prefers-reduced-motion:reduce){.bar > i{transition:none}}

  /* controls */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:24px 0 18px;padding-top:18px;border-top:1px solid var(--line)}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line);border-radius:10px;background:var(--surface);font:inherit;color:var(--ink)}
  .search input:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:transparent}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font:inherit;font-size:13px;padding:7px 13px;border-radius:99px;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);cursor:pointer}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip:focus-visible{outline:2px solid var(--primary);outline-offset:1px}

  /* banner */
  .banner{display:none;gap:10px;align-items:flex-start;background:var(--primary-tint);border:1px solid #D6DAF4;color:#2B3470;padding:12px 14px;border-radius:10px;font-size:13.5px;margin-bottom:18px}
  .banner.show{display:flex}
  .banner b{font-weight:600}

  /* list = curriculum spine */
  ol.spine{list-style:none;margin:0;padding:0}
  .row{display:grid;grid-template-columns:54px 1fr auto;gap:16px;align-items:center;padding:16px 4px;border-bottom:1px solid var(--line)}
  .stt{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--primary);text-align:right;font-variant-numeric:tabular-nums}
  .meta{min-width:0}
  .topic{font-weight:600;font-size:15.5px;word-break:break-word}
  .badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-top:4px}
  .dot{width:8px;height:8px;border-radius:99px;background:var(--todo)}
  .badge.done .dot{background:var(--done)} .badge.done{color:var(--done)}
  .badge.doing .dot{background:var(--doing)} .badge.doing{color:var(--doing)}
  .actions{display:flex;gap:8px;flex-shrink:0}
  .btn{font:inherit;font-size:13px;padding:8px 13px;border-radius:9px;border:1px solid var(--primary);background:var(--surface);color:var(--primary);cursor:pointer;white-space:nowrap;font-weight:500}
  .btn:hover{background:var(--primary-tint)}
  .btn:focus-visible{outline:2px solid var(--primary);outline-offset:1px}
  .btn[disabled]{border-color:var(--line);color:var(--todo);cursor:not-allowed;background:var(--surface)}
  .empty{text-align:center;color:var(--ink-soft);padding:48px 0;font-size:15px}

  /* reading pane */
  .pane{position:fixed;inset:0;background:rgba(22,24,43,.4);display:none;z-index:50}
  .pane.open{display:block}
  .pane-inner{position:absolute;top:0;right:0;bottom:0;width:min(860px,100%);background:var(--surface);display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(22,24,43,.18)}
  .pane-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .pane-head .pstt{font-family:var(--mono);font-weight:600;color:var(--primary)}
  .pane-head .ptopic{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pane-head a,.pane-head button{font:inherit;font-size:13px;border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:7px 11px;cursor:pointer;color:var(--ink);text-decoration:none}
  .pane-head .close{font-size:18px;line-height:1;padding:6px 11px}
  .tabs{display:flex;gap:4px;padding:10px 16px 0}
  .tab{font:inherit;font-size:13.5px;padding:8px 14px;border:none;background:none;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
  .tab[aria-selected="true"]{color:var(--primary);border-bottom-color:var(--primary)}
  iframe{flex:1;width:100%;border:0;background:#fff}
  .pane-placeholder{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--ink-soft);padding:32px;font-size:14.5px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="title">FE Syllabus · 学習トラッカー</div>
      <h1>Tài liệu học FE <span class="jp">／ 教材</span></h1>
    </div>
    <div class="progress-box">
      <div class="progress-num" id="pnum">0<span> / 0 bài</span></div>
      <div class="bar"><i id="pbar" style="width:0%"></i></div>
    </div>
  </header>

  <div class="banner" id="banner">
    <span>ⓘ</span>
    <div><b>Đang xem bản mẫu.</b> Khi đã đưa <code>lessons.json</code> và các file bài học lên GitHub Pages, danh sách thật sẽ tự hiện và bài học mở ngay trong trang.</div>
  </div>

  <div class="controls">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Tìm theo chủ đề hoặc STT…" aria-label="Tìm bài học">
    </div>
    <div class="chips" role="group" aria-label="Lọc theo trạng thái">
      <button class="chip" data-f="all" aria-pressed="true">Tất cả</button>
      <button class="chip" data-f="done" aria-pressed="false">Đã học</button>
      <button class="chip" data-f="doing" aria-pressed="false">Đang học</button>
      <button class="chip" data-f="todo" aria-pressed="false">Chưa học</button>
    </div>
  </div>

  <ol class="spine" id="list"></ol>
  <div class="empty" id="empty" style="display:none">Không có bài nào khớp.</div>
</div>

<!-- reading pane -->
<div class="pane" id="pane" role="dialog" aria-modal="true" aria-label="Bài học">
  <div class="pane-inner">
    <div class="pane-head">
      <span class="pstt" id="pPstt"></span>
      <span class="ptopic" id="pTopic"></span>
      <a id="pNew" href="#" target="_blank" rel="noopener" title="Mở tab mới">↗ Tab mới</a>
      <button class="close" id="pClose" aria-label="Đóng">✕</button>
    </div>
    <div class="tabs">
      <button class="tab" id="tabTheory" aria-selected="true">Lý thuyết</button>
      <button class="tab" id="tabTest" aria-selected="false">Kiểm tra 40 câu</button>
    </div>
    <iframe id="frame" title="Nội dung bài học"></iframe>
    <div class="pane-placeholder" id="placeholder" style="display:none"></div>
  </div>
</div>

<script>
const SAMPLE = {
  title:"FE — Tài liệu học",
  lessons:[
    {stt:1, topic:"n進数の概念 · Khái niệm hệ cơ số n", theory:"ly-thuyet/1.html", test:"kiem-tra/1.html", status:"done"},
    {stt:2, topic:"基数変換 · Chuyển đổi cơ số", theory:"ly-thuyet/2.html", test:"kiem-tra/2.html", status:"done"},
    {stt:6, topic:"論理回路 · Mạch logic", theory:"ly-thuyet/6.html", test:"kiem-tra/6.html", status:"done"},
    {stt:13, topic:"ソート · Sắp xếp", theory:"ly-thuyet/13.html", test:"kiem-tra/13.html", status:"doing"},
    {stt:14, topic:"OOP+UML + 過去問 Ch.3", theory:null, test:null, status:"todo"},
    {stt:15, topic:"5大装置・CPU基本", theory:null, test:null, status:"todo"}
  ]
};
const ST = {done:"Đã học", doing:"Đang học", todo:"Chưa học"};
let DATA = [], filter = "all", query = "", sampleMode = false, cur = null, curTab = "theory";

const $ = s => document.querySelector(s);
const list = $("#list"), empty = $("#empty");

async function load(){
  try{
    const r = await fetch("./lessons.json", {cache:"no-store"});
    if(!r.ok) throw 0;
    const j = await r.json();
    DATA = j.lessons || [];
  }catch(e){
    DATA = SAMPLE.lessons; sampleMode = true; $("#banner").classList.add("show");
  }
  DATA.sort((a,b)=>a.stt-b.stt);
  render(); updateProgress();
}

function updateProgress(){
  const done = DATA.filter(l=>l.status==="done").length, tot = DATA.length;
  $("#pnum").innerHTML = done + "<span> / " + tot + " bài</span>";
  $("#pbar").style.width = (tot? (done/tot*100):0) + "%";
}

function render(){
  const q = query.trim().toLowerCase();
  const rows = DATA.filter(l=>{
    if(filter!=="all" && l.status!==filter) return false;
    if(q && !((l.topic||"").toLowerCase().includes(q) || String(l.stt).includes(q))) return false;
    return true;
  });
  list.innerHTML = "";
  empty.style.display = rows.length? "none":"block";
  for(const l of rows){
    const li = document.createElement("li");
    li.className = "row";
    li.innerHTML = `
      <div class="stt">${String(l.stt).padStart(2,"0")}</div>
      <div class="meta">
        <div class="topic"></div>
        <div class="badge ${l.status}"><span class="dot"></span>${ST[l.status]||""}</div>
      </div>
      <div class="actions">
        <button class="btn" data-t="theory" ${l.theory?"":"disabled"}>Lý thuyết</button>
        <button class="btn" data-t="test" ${l.test?"":"disabled"}>Kiểm tra</button>
      </div>`;
    li.querySelector(".topic").textContent = l.topic || "(chưa có chủ đề)";
    li.querySelectorAll("button[data-t]").forEach(b=>{
      if(!b.disabled) b.onclick = ()=>open(l, b.dataset.t);
    });
    list.appendChild(li);
  }
}

function open(l, tab){
  cur = l; curTab = (tab==="test" && l.test)?"test":(l.theory?"theory":"test");
  $("#pPstt").textContent = String(l.stt).padStart(2,"0");
  $("#pTopic").textContent = l.topic || "";
  $("#tabTheory").style.display = l.theory? "":"none";
  $("#tabTest").style.display = l.test? "":"none";
  $("#pane").classList.add("open");
  document.body.style.overflow = "hidden";
  showTab(curTab);
}
function showTab(tab){
  curTab = tab;
  $("#tabTheory").setAttribute("aria-selected", tab==="theory");
  $("#tabTest").setAttribute("aria-selected", tab==="test");
  const src = tab==="theory"? cur.theory : cur.test;
  $("#pNew").href = src || "#";
  const frame = $("#frame"), ph = $("#placeholder");
  if(sampleMode){
    frame.style.display="none"; ph.style.display="flex";
    ph.textContent = "Bản mẫu — nội dung bài sẽ hiển thị ở đây sau khi deploy lên GitHub Pages.";
  }else{
    ph.style.display="none"; frame.style.display="block"; frame.src = src;
  }
}
function close(){
  $("#pane").classList.remove("open");
  document.body.style.overflow = "";
  $("#frame").src = "about:blank"; cur = null;
}

$("#tabTheory").onclick = ()=>showTab("theory");
$("#tabTest").onclick = ()=>showTab("test");
$("#pClose").onclick = close;
$("#pane").onclick = e=>{ if(e.target.id==="pane") close(); };
document.addEventListener("keydown", e=>{ if(e.key==="Escape") close(); });
$("#q").addEventListener("input", e=>{ query = e.target.value; render(); });
document.querySelectorAll(".chip").forEach(c=>{
  c.onclick = ()=>{
    filter = c.dataset.f;
    document.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed", x===c));
    render();
  };
});

load();
</script>
</body>
</html>
